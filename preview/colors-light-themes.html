<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Light themes — cold & warm" subtitle="Secondary off-white palettes" viewport="700x150" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1C2128;font-family:'JetBrains Mono',monospace;padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.theme{border-radius:4px;overflow:hidden;border:1px solid}
.hd{padding:9px 12px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.body{padding:12px;display:flex;gap:6px;flex-wrap:wrap}
.s{width:38px;height:38px;border-radius:3px;border:1px solid rgba(0,0,0,.1)}
.cold{border-color:#CDD5E0;background:#EEF2F7}
.cold .hd{background:#E2E8F0;color:#1C2128}
.warm{border-color:#D8D2C8;background:#F5F0E8}
.warm .hd{background:#EDE8DF;color:#1C1A17}
</style></head><body>
<div class="theme cold">
  <div class="hd">Холодный офф-вайт</div>
  <div class="body">
    <div class="s" style="background:#EEF2F7"></div><div class="s" style="background:#E2E8F0"></div>
    <div class="s" style="background:#CDD5E0"></div><div class="s" style="background:#1C2128"></div>
    <div class="s" style="background:#57606A"></div><div class="s" style="background:#00AA85"></div>
  </div>
</div>
<div class="theme warm">
  <div class="hd">Тёплый песочный</div>
  <div class="body">
    <div class="s" style="background:#F5F0E8"></div><div class="s" style="background:#EDE8DF"></div>
    <div class="s" style="background:#D8D2C8"></div><div class="s" style="background:#1C1A17"></div>
    <div class="s" style="background:#6B6560"></div><div class="s" style="background:#009B78"></div>
  </div>
</div>
</body></html>
