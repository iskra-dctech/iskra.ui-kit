<!DOCTYPE html>
<!-- @dsCard group="Components" name="Fleet pulse & CLI row" subtitle="Interactive sync ring → expandable problem-device list" viewport="700x280" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:22px;color:#F0F6FC}
.panel{background:#161B22;border:1px solid #30363D;border-radius:4px;overflow:hidden;margin-bottom:12px}
.pulse{padding:16px 18px;display:flex;align-items:center;gap:18px;cursor:pointer;transition:background .15s}
.pulse:hover{background:#1A212B}
.ring{width:56px;height:56px;flex-shrink:0}
.ring circle.fg{transition:stroke .15s}
.pct{font-size:26px;font-weight:700;line-height:1}
.plabel{font-family:'JetBrains Mono',monospace;font-size:9px;color:#8B949E;letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
.psub{font-size:12px;color:#8B949E;margin-top:7px}
.psub b{color:#F97316;font-weight:600}
.chev{margin-left:auto;color:#8B949E;font-size:13px;transition:transform .2s;font-family:'JetBrains Mono'}
.panel.open .chev{transform:rotate(180deg)}

/* problem list */
.issues{border-top:1px solid #30363D;max-height:0;overflow:hidden;transition:max-height .25s ease}
.panel.open .issues{max-height:240px}
.ihd{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#6E7681;padding:9px 18px 4px}
.irow{display:flex;align-items:center;gap:10px;padding:8px 18px;border-top:1px solid #21262D;transition:background .12s}
.irow:hover{background:#1A212B}
.idot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.iname{font-family:'JetBrains Mono',monospace;font-size:12px;color:#F0F6FC;width:120px}
.ireason{font-size:12px;color:#8B949E;flex:1}
.ibadge{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:3px 0;border-radius:2px;border:1px solid;width:54px;text-align:center;flex-shrink:0}
.ibadge.err{color:#F85149;border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.08)}
.ibadge.warn{color:#F97316;border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.08)}
.ifix{font-family:'Inter';font-size:11px;font-weight:500;color:#00FFC2;border:1px solid #00FFC2;background:transparent;border-radius:3px;padding:3px 9px;cursor:pointer;white-space:nowrap;transition:background .15s}
.ifix:hover{background:rgba(0,255,194,.12)}

.cli{display:flex;align-items:center;gap:10px;padding:9px 12px;background:#0D1117;border:1px solid #30363D;border-radius:4px}
.cliicon{font-family:'JetBrains Mono';color:#00AA85;font-size:12px}
.clitext{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8B949E;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clicopy{font-family:'JetBrains Mono';font-size:10px;color:#00FFC2;border:1px solid #00FFC2;border-radius:2px;padding:2px 7px;cursor:pointer}
</style></head><body>
<div class="panel open" id="panel">
  <div class="pulse" onclick="document.getElementById('panel').classList.toggle('open')">
    <svg class="ring" viewBox="0 0 56 56"><circle cx="28" cy="28" r="22" fill="none" stroke="#30363D" stroke-width="4"/><circle class="fg" cx="28" cy="28" r="22" fill="none" stroke="#00FFC2" stroke-width="4" stroke-dasharray="112 26" stroke-dashoffset="34" stroke-linecap="round" transform="rotate(-90 28 28)"/></svg>
    <div>
      <div class="pct">81%</div>
      <div class="plabel">Fleet in Sync</div>
      <div class="psub"><b>3 устройства</b> требуют внимания — нажмите, чтобы развернуть</div>
    </div>
    <span class="chev">▾</span>
  </div>
  <div class="issues">
    <div class="ihd">Проблемные устройства · 3</div>
    <div class="irow"><span class="idot" style="background:#F85149"></span><span class="iname">border-01.spb</span><span class="ireason">Потеря связи с устройством</span><span class="ibadge err">Error</span><button class="ifix">⟳ Retry</button></div>
    <div class="irow"><span class="idot" style="background:#F97316"></span><span class="iname">leaf-07.msk</span><span class="ireason">Drift: BGP-конфигурация</span><span class="ibadge warn">Drift</span><button class="ifix">⟳ Sync</button></div>
    <div class="irow"><span class="idot" style="background:#F97316"></span><span class="iname">leaf-12.msk</span><span class="ireason">Drift: MTU расходится</span><span class="ibadge warn">Drift</span><button class="ifix">⟳ Sync</button></div>
  </div>
</div>
<div class="cli"><span class="cliicon">&lt;/&gt;</span><span class="clitext">curl -X POST .../api/v1/devices/leaf-07/actions/sync</span><span class="clicopy">⎘ Copy</span></div>
</body></html>
