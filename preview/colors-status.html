<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Status model" subtitle="Sync / Drift / Error / Off / Info" viewport="700x200" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:22px;display:flex;flex-direction:column;gap:9px}
.r{display:flex;align-items:center;gap:14px}
.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.nm{font-size:13px;font-weight:600;color:#F0F6FC;width:150px}
.hx{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8B949E;width:80px}
.use{font-size:12px;color:#8B949E}
</style></head><body>
<div class="r"><span class="dot" style="background:#00FFC2"></span><span class="nm">Sync / Online</span><span class="hx">#00FFC2</span><span class="use">синхронизация, успех</span></div>
<div class="r"><span class="dot" style="background:#F97316"></span><span class="nm">Drift / Warning</span><span class="hx">#F97316</span><span class="use">расхождение состояния</span></div>
<div class="r"><span class="dot" style="background:#F85149"></span><span class="nm">Error / Critical</span><span class="hx">#F85149</span><span class="use">ошибка, потеря связи</span></div>
<div class="r"><span class="dot" style="background:#6E7681"></span><span class="nm">Maintenance</span><span class="hx">#6E7681</span><span class="use">обслуживание, отключено</span></div>
<div class="r"><span class="dot" style="background:#58A6FF"></span><span class="nm">Info / Neutral</span><span class="hx">#58A6FF</span><span class="use">инфо (минимально)</span></div>
</body></html>
