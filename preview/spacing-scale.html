<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale — 8px base" subtitle="4 → 64px tokens" viewport="700x290" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'JetBrains Mono',monospace;padding:24px;display:flex;flex-direction:column;gap:10px}
.r{display:flex;align-items:center;gap:14px}
.bar{height:16px;background:#00AA85;border-radius:2px}
.tok{font-size:11px;color:#8B949E;width:60px}
.px{font-size:11px;color:#F0F6FC;width:46px}
.note{font-size:11px;color:#6E7681;margin-top:6px}
</style></head><body>
<div class="r"><span class="tok">--s1</span><span class="px">4px</span><div class="bar" style="width:4px"></div></div>
<div class="r"><span class="tok">--s2</span><span class="px">8px</span><div class="bar" style="width:8px"></div></div>
<div class="r"><span class="tok">--s3</span><span class="px">12px</span><div class="bar" style="width:12px"></div></div>
<div class="r"><span class="tok">--s4</span><span class="px">16px</span><div class="bar" style="width:16px"></div></div>
<div class="r"><span class="tok">--s5</span><span class="px">24px</span><div class="bar" style="width:24px"></div></div>
<div class="r"><span class="tok">--s6</span><span class="px">32px</span><div class="bar" style="width:32px"></div></div>
<div class="r"><span class="tok">--s7</span><span class="px">48px</span><div class="bar" style="width:48px"></div></div>
<div class="r"><span class="tok">--s8</span><span class="px">64px</span><div class="bar" style="width:64px"></div></div>
<div class="note">8px base · 4px allowed for micro-detail · all sizes multiples of 8</div>
</body></html>
