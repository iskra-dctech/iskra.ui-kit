<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Accent — Cyber Mint" subtitle="Mint indicator vs AA-safe text" viewport="700x210" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:22px;color:#F0F6FC}
.top{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sw{border:1px solid #30363D;border-radius:4px;overflow:hidden}
.chip{height:56px}
.meta{padding:7px 10px;background:#161B22;font-family:'JetBrains Mono',monospace}
.nm{font-size:11px;color:#F0F6FC;font-weight:600;margin-bottom:2px}
.hx{font-size:10px;color:#8B949E}
.rule{display:flex;gap:14px;align-items:center;background:#161B22;border:1px solid #30363D;border-radius:4px;padding:12px 14px}
.rule .x{color:#F85149;font-family:'JetBrains Mono';font-size:11px}
.rule .ok{color:#00AA85;font-family:'JetBrains Mono';font-size:11px}
.rule .lbl{font-size:12px;color:#8B949E}
</style></head><body>
<div class="top">
  <div class="sw"><div class="chip" style="background:#00FFC2"></div><div class="meta"><div class="nm">Cyber Mint</div><div class="hx">#00FFC2 · border/indicator</div></div></div>
  <div class="sw"><div class="chip" style="background:#00CC9A"></div><div class="meta"><div class="nm">Mint Hover</div><div class="hx">#00CC9A</div></div></div>
  <div class="sw"><div class="chip" style="background:#00AA85"></div><div class="meta"><div class="nm">Mint Safe (text)</div><div class="hx">#00AA85 · AA on dark</div></div></div>
</div>
<div class="rule">
  <span class="x">✕ #00FFC2 as text</span><span class="lbl">1.6:1 — fails WCAG AA</span>
  <span style="flex:1"></span>
  <span class="ok">✓ #00AA85 as text</span><span class="lbl">use for accent labels</span>
</div>
</body></html>
