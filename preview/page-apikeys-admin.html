<!DOCTYPE html>
<!-- @startingPoint section="Components" subtitle="Админ-консоль API-ключей · сводка, фильтры, массовый отзыв, политики" viewport="1280x860" -->
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>API-ключи · Администрирование · Искра.DCI</title>
<style>
/* ===== inlined colors_and_type.css ===== */
/* ============================================================
   ИСКРА.DCI — Design Tokens · Colors & Type
   Hard-Shell Minimal · technical minimalism, single accent hue
   Root font-size is INTENTIONALLY 14px (data-dense product).
   Load Inter + JetBrains Mono before this file.
   ============================================================ */

@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}

:root {
  /* ---- DARK THEME (primary / default) ------------------- */
  --bg:            #0D1117;  /* Anthracite Deep — global page bg   */
  --panel:         #161B22;  /* Elevated Graphite — cards, modals  */
  --panel-soft:    #1D2530;  /* slightly raised insets             */
  --panel-muted:   #202A35;  /* table headers, hover fills         */
  --line:          #30363D;  /* borders, dividers (1px everywhere) */
  --line-soft:     rgba(48,54,61,.5);

  --fg1:           #F0F6FC;  /* primary text                       */
  --fg2:           #8B949E;  /* secondary text, placeholders       */
  --fg3:           #6E7681;  /* tertiary / disabled                */

  /* ---- ACCENT · Cyber Mint ------------------------------ */
  --accent:        #00FFC2;  /* indicators, borders, focus ONLY    */
  --accent-hover:  #00CC9A;  /* hover for icons/borders            */
  --accent-safe:   #00AA85;  /* AA-safe accent for TEXT on dark    */
  --accent-soft:   rgba(0,170,133,.14);
  --accent-line:   rgba(0,170,133,.32);

  /* ---- STATUS MODEL (signal only, never decorative) ----- */
  --status-ok:     #00FFC2;  /* Sync / Online                      */
  --status-warn:   #F97316;  /* Drift / Warning                    */
  --status-err:    #F85149;  /* Error / Critical                   */
  --status-off:    #6E7681;  /* Maintenance / Inactive             */
  --status-info:   #58A6FF;  /* Info / Neutral (used minimally)    */

  /* ---- TYPE FAMILIES ------------------------------------ */
  --font-ui:       'Inter', system-ui, -apple-system, sans-serif;
  --font-display:  'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:     'JetBrains Mono', ui-monospace, 'SF Mono', monospace;

  /* ---- TYPE SCALE (px on a 14px root) ------------------- */
  --text-h1:       24px;   --lh-h1: 1.2; /* @kind font */  --wt-h1: 600; /* @kind font */
  --text-h2:       20px;   --lh-h2: 1.2; /* @kind font */  --wt-h2: 600; /* @kind font */
  --text-h3:       18px;   --lh-h3: 1.2; /* @kind font */  --wt-h3: 600; /* @kind font */
  --text-ui:       14px;   --lh-ui: 1.4; /* @kind font */  --wt-ui: 400; /* @kind font */
  --text-ui-med:   14px;                   --wt-ui-med: 500; /* @kind font */
  --text-small:    12px;   --lh-sm: 1.4; /* @kind font */
  --text-mono:     13px;   --lh-mono: 1.45; /* @kind font */
  --text-label:    11px;   /* mono uppercase eyebrows         */

  /* ---- SPACING · 8px base (4px for micro) --------------- */
  --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
  --s5: 24px; --s6: 32px; --s7: 48px; --s8: 64px;

  /* ---- RADIUS · fixed 4px everywhere -------------------- */
  --radius: 4px;
  --radius-sm: 2px;

  /* ---- BORDERS / ELEVATION ------------------------------ */
  /* No shadows. Layers separated by a single 1px border.   */
  --border: 1px solid var(--line);
  --focus-ring: 0 0 0 1px var(--accent);

  /* ---- MOTION ------------------------------------------- */
  --ease: cubic-bezier(.2,.6,.2,1); /* @kind other */
  --dur: .15s; /* @kind other */

  /* ---- CONTROL SIZES ------------------------------------ */
  --control-h: 32px;
  --control-h-lg: 36px;
}

/* ============================================================
   COLD LIGHT THEME  (off-white, neutral) — apply .theme-cold
   ============================================================ */
.theme-cold {
  --bg:#EEF2F7; --panel:#E2E8F0; --panel-soft:#E9EEF4; --panel-muted:#DCE3EC;
  --line:#CDD5E0; --line-soft:rgba(205,213,224,.6);
  --fg1:#1C2128; --fg2:#57606A; --fg3:#8B949E;
  --accent:#00AA85; --accent-hover:#009478; --accent-safe:#008268;
  --accent-soft:#E6F7F2; --accent-line:rgba(0,170,133,.32);
  --status-ok:#00AA85; --status-warn:#D0610A; --status-err:#D0302A;
  --status-off:#6E7681; --status-info:#2E6DA4;
}

/* ============================================================
   WARM LIGHT THEME  (paper / sand) — apply .theme-warm
   ============================================================ */
.theme-warm {
  --bg:#F5F0E8; --panel:#EDE8DF; --panel-soft:#F0EBE3; --panel-muted:#E4DED3;
  --line:#D8D2C8; --line-soft:rgba(216,210,200,.6);
  --fg1:#1C1A17; --fg2:#6B6560; --fg3:#9A948C;
  --accent:#009B78; --accent-hover:#008268; --accent-safe:#00795D;
  --accent-soft:#E8F5F0; --accent-line:rgba(0,155,120,.32);
  --status-ok:#009B78; --status-warn:#C2620A; --status-err:#C23B36;
  --status-off:#7A756E; --status-info:#3A6FA8;
}

/* ============================================================
   SEMANTIC ELEMENT STYLES
   ============================================================ */
.iskra-scope { font-size:14px; }          /* enforce 14px root      */

.h1 { font-family:var(--font-display); font-size:var(--text-h1); line-height:var(--lh-h1); font-weight:var(--wt-h1); letter-spacing:-.02em; color:var(--fg1); }
.h2 { font-family:var(--font-display); font-size:var(--text-h2); line-height:var(--lh-h2); font-weight:var(--wt-h2); letter-spacing:-.02em; color:var(--fg1); }
.h3 { font-family:var(--font-display); font-size:var(--text-h3); line-height:var(--lh-h3); font-weight:var(--wt-h3); letter-spacing:-.01em; color:var(--fg1); }
.p  { font-family:var(--font-ui); font-size:var(--text-ui); line-height:var(--lh-ui); color:var(--fg1); }
.small { font-size:var(--text-small); line-height:var(--lh-sm); color:var(--fg2); }
.mono { font-family:var(--font-mono); font-size:var(--text-mono); line-height:var(--lh-mono); color:var(--fg1); }
.code { font-family:var(--font-mono); font-size:var(--text-mono); color:var(--accent-safe); }

/* mono uppercase eyebrow / section label */
.label {
  font-family:var(--font-mono);
  font-size:var(--text-label);
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--fg2);
}

</style>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg1);font-family:var(--font-ui);font-size:14px;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--accent-soft)}
  button{font-family:inherit}
  *::-webkit-scrollbar{width:8px;height:8px}
  *::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  *::-webkit-scrollbar-track{background:transparent}
  .feather{stroke-width:1.5}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}
  tr.arow td{transition:background .12s}
  tr.arow:hover td{background:var(--panel-soft)}
  tr.arow.sel td{background:var(--accent-soft)}
</style>
</head>
<body class="iskra-scope">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/feather-icons@4.29.2/dist/feather.min.js"></script>

<script type="text/babel">
/* ===== inlined apikeys-shared.jsx ===== */
/* ИСКРА.DCI — API Keys · shared data + primitives (exports to window) */

/* ─────────────── Permission catalog (mirrors the create modal) ─────────────── */
const PERM_GROUPS = [
  { group: 'Устройства', perms: [
    { id:'devices:read',     name:'Чтение устройств',         desc:'Список, статус, метаданные, топология' },
    { id:'devices:write',    name:'Редактирование устройств', desc:'Изменение полей, тегов, режима обслуживания' },
  ]},
  { group: 'Конфигурации', perms: [
    { id:'config:read',      name:'Чтение конфигураций',      desc:'Получение текущего и эталонного стейта' },
    { id:'config:apply',     name:'Применение конфигураций',  desc:'Push, reconcile, rollback на устройстве' },
  ]},
  { group: 'Наблюдаемость', perms: [
    { id:'monitoring:read',  name:'Мониторинг и метрики',     desc:'Телеметрия, uptime, threshold-статусы' },
    { id:'audit:read',       name:'Журнал аудита',            desc:'События изменений и доступа, только чтение' },
  ]},
  { group: 'Интеграции', perms: [
    { id:'webhooks:manage',  name:'Управление webhooks',      desc:'Создание и доставка событий во внешние системы' },
    { id:'sync:trigger',     name:'Запуск синхронизации',     desc:'Force Sync, reconcile вне расписания' },
  ]},
];
const PERM_MAP = {};
PERM_GROUPS.forEach(g => g.perms.forEach(p => { PERM_MAP[p.id] = { ...p, group:g.group }; }));
const ALL_PERMS = Object.keys(PERM_MAP);

/* ─────────────── Mock keys ─────────────── */
// today ≈ 2026-06-09
const USER_KEYS = [
  { id:'k1', name:'monitoring-prod-01', prefix:'isk_live_a3f2',  status:'active',
    perms:['devices:read','monitoring:read','audit:read'], created:'12.01.2026', expires:'30.09.2026', last:'2 мин назад' },
  { id:'k2', name:'ci-deploy',          prefix:'isk_live_7b91',  status:'active',
    perms:['config:read','config:apply','devices:read','sync:trigger'], created:'03.11.2025', expires:null, last:'3 ч назад' },
  { id:'k3', name:'grafana-readonly',   prefix:'isk_live_e0c4',  status:'active', expiringSoon:true,
    perms:['monitoring:read'], created:'01.03.2026', expires:'20.06.2026', last:'1 д назад' },
  { id:'k4', name:'legacy-import',      prefix:'isk_live_19af',  status:'expired',
    perms:['devices:read','devices:write'], created:'10.02.2025', expires:'10.02.2026', last:'—' },
  { id:'k5', name:'old-webhook',        prefix:'isk_live_55de',  status:'revoked',
    perms:['webhooks:manage'], created:'15.08.2025', expires:'отозван 01.04.2026', last:'—' },
];

const OWNERS = {
  'anna.k':   { name:'anna.k',   role:'operator', color:'#58A6FF' },
  'dmitry.v': { name:'dmitry.v', role:'operator', color:'#00AA85' },
  'root':     { name:'root',     role:'root',     color:'#F97316' },
  'ci-bot':   { name:'ci-bot',   role:'service',  color:'#8B949E' },
  'viewer.s': { name:'viewer.s', role:'viewer',   color:'#A371F7' },
};
const ADMIN_KEYS = [
  { id:'a1', owner:'anna.k',   name:'monitoring-prod-01', prefix:'isk_live_a3f2', status:'active',
    perms:['devices:read','monitoring:read','audit:read'], created:'12.01.2026', expires:'30.09.2026', last:'2 мин назад' },
  { id:'a2', owner:'ci-bot',   name:'ci-deploy',          prefix:'isk_live_7b91', status:'active',
    perms:['config:read','config:apply','devices:read','sync:trigger'], created:'03.11.2025', expires:null, last:'3 ч назад' },
  { id:'a3', owner:'dmitry.v', name:'grafana-readonly',   prefix:'isk_live_e0c4', status:'active', expiringSoon:true,
    perms:['monitoring:read'], created:'01.03.2026', expires:'20.06.2026', last:'1 д назад' },
  { id:'a4', owner:'root',     name:'platform-admin',     prefix:'isk_live_b220', status:'active',
    perms:ALL_PERMS, created:'05.09.2025', expires:null, last:'7 мин назад' },
  { id:'a5', owner:'ci-bot',   name:'reconcile-runner',   prefix:'isk_live_cc01', status:'active',
    perms:['config:read','config:apply','sync:trigger'], created:'22.02.2026', expires:'22.08.2026', last:'40 мин назад' },
  { id:'a6', owner:'viewer.s', name:'dashboards-ro',      prefix:'isk_live_3f7a', status:'active', expiringSoon:true,
    perms:['monitoring:read','devices:read'], created:'18.04.2026', expires:'18.06.2026', last:'5 ч назад' },
  { id:'a7', owner:'anna.k',   name:'legacy-import',      prefix:'isk_live_19af', status:'expired',
    perms:['devices:read','devices:write'], created:'10.02.2025', expires:'10.02.2026', last:'—' },
  { id:'a8', owner:'dmitry.v', name:'old-webhook',        prefix:'isk_live_55de', status:'revoked',
    perms:['webhooks:manage'], created:'15.08.2025', expires:'отозван 01.04.2026', last:'—' },
  { id:'a9', owner:'root',     name:'break-glass-2025',   prefix:'isk_live_9d4e', status:'revoked',
    perms:ALL_PERMS, created:'01.01.2025', expires:'отозван 14.03.2026', last:'—' },
];

/* ─────────────── Primitives ─────────────── */
function Icon({ name, size = 16, strokeWidth = 1.5, style }) {
  const svg = (window.feather && window.feather.icons[name])
    ? window.feather.icons[name].toSvg({ width:size, height:size, 'stroke-width':strokeWidth })
    : '';
  return <span aria-hidden="true" style={{ display:'inline-flex', ...style }}
    dangerouslySetInnerHTML={{ __html: svg }} />;
}

const DOT = { active:'var(--status-ok)', expired:'var(--status-off)', revoked:'var(--status-err)' };
function StatusDot({ status='active', size=8 }) {
  return <span style={{ width:size, height:size, borderRadius:'50%', background:DOT[status]||DOT.active, flexShrink:0, display:'inline-block' }} />;
}

const BADGE = {
  active:  { c:'var(--status-ok)',   b:'rgba(0,255,194,.4)', bg:'rgba(0,255,194,.08)',  t:'Активен' },
  expired: { c:'var(--fg2)',         b:'var(--line)',        bg:'var(--panel)',         t:'Истёк' },
  revoked: { c:'var(--status-err)',  b:'rgba(248,81,73,.4)', bg:'rgba(248,81,73,.08)',  t:'Отозван' },
  warn:    { c:'var(--status-warn)', b:'rgba(249,115,22,.4)',bg:'rgba(249,115,22,.08)', t:'' },
  info:    { c:'var(--status-info)', b:'rgba(88,166,255,.4)',bg:'rgba(88,166,255,.08)', t:'' },
};
function Badge({ status='active', children }) {
  const m = BADGE[status] || BADGE.active;
  const dot = { active:'var(--status-ok)', expired:'var(--status-off)', revoked:'var(--status-err)', warn:'var(--status-warn)', info:'var(--status-info)' }[status];
  return <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:"var(--font-ui)", fontSize:11, fontWeight:500,
    padding:'3px 8px', borderRadius:'var(--radius-sm)', border:`1px solid ${m.b}`, color:m.c, background:m.bg, whiteSpace:'nowrap' }}>
    <span style={{ width:5, height:5, borderRadius:'50%', background:dot }} />{children || m.t}
  </span>;
}

function Button({ variant='secondary', icon, children, onClick, disabled, size='md', style }) {
  const [h, setH] = React.useState(false);
  const base = { height: size==='sm'?28:32, padding: size==='sm'?'0 12px':'0 16px', borderRadius:'var(--radius)',
    fontFamily:"var(--font-ui)", fontSize:13, fontWeight:500, display:'inline-flex', alignItems:'center', gap:7,
    border:'1px solid', background:'transparent', cursor:disabled?'not-allowed':'pointer',
    transition:'background .15s,color .15s,border-color .15s', opacity:disabled?.4:1, whiteSpace:'nowrap' };
  const V = {
    primary:    { borderColor:'var(--accent)', color:'var(--accent)', background:(h&&!disabled)?'rgba(0,255,194,.12)':'transparent' },
    secondary:  { borderColor:(h&&!disabled)?'var(--accent)':'var(--line)', color:(h&&!disabled)?'var(--accent)':'var(--fg1)' },
    destructive:{ borderColor:'var(--status-err)', color:'var(--status-err)', background:(h&&!disabled)?'rgba(248,81,73,.1)':'transparent' },
    ghost:      { borderColor:'transparent', color:(h&&!disabled)?'var(--accent)':'var(--fg2)' },
  };
  return <button onClick={disabled?undefined:onClick} disabled={disabled}
    onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ ...base, ...V[variant], ...style }}>
    {icon && <Icon name={icon} size={15} />}{children}
  </button>;
}

// small square icon-only action button used in table rows
function IconBtn({ icon, title, danger, onClick }) {
  const [h, setH] = React.useState(false);
  const color = danger ? 'var(--status-err)' : (h ? 'var(--accent)' : 'var(--fg2)');
  return <button title={title} onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{ width:28, height:28, display:'inline-flex', alignItems:'center', justifyContent:'center',
      border:`1px solid ${h?(danger?'rgba(248,81,73,.4)':'var(--accent)'):'transparent'}`,
      borderRadius:'var(--radius)', background: h?(danger?'rgba(248,81,73,.08)':'var(--accent-soft)'):'transparent',
      color, cursor:'pointer', transition:'all .15s' }}>
    <Icon name={icon} size={15} />
  </button>;
}

// permissions count chip with a hover tooltip listing scopes
function PermCell({ perms }) {
  const [open, setOpen] = React.useState(false);
  const isAll = perms.length === ALL_PERMS.length;
  return <span style={{ position:'relative', display:'inline-flex' }}
    onMouseEnter={()=>setOpen(true)} onMouseLeave={()=>setOpen(false)}>
    <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:"var(--font-mono)", fontSize:11,
      padding:'2px 8px', borderRadius:'var(--radius-sm)', cursor:'default',
      border:`1px solid ${isAll?'var(--accent-line)':'var(--line)'}`,
      color:isAll?'var(--accent-safe)':'var(--fg2)', background:isAll?'var(--accent-soft)':'var(--bg)' }}>
      <Icon name={isAll?'shield':'key'} size={12} />
      {isAll ? 'все права' : `${perms.length} ${plural(perms.length)}`}
    </span>
    {open && <div style={{ position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:40, minWidth:200,
      background:'var(--panel-soft)', border:'1px solid var(--line)', borderRadius:'var(--radius)', padding:'8px',
      display:'flex', flexDirection:'column', gap:4 }}>
      {perms.map(p => <span key={p} style={{ fontFamily:"var(--font-mono)", fontSize:11, color:'var(--fg1)', whiteSpace:'nowrap' }}>
        <span style={{ color:'var(--accent-safe)' }}>›</span> {p}
      </span>)}
    </div>}
  </span>;
}
function plural(n){ const a=n%10,b=n%100; if(a===1&&b!==11)return'право'; if(a>=2&&a<=4&&(b<10||b>=20))return'права'; return'прав'; }

// owner avatar (initials)
function Owner({ id }) {
  const o = OWNERS[id] || { name:id, role:'', color:'var(--fg2)' };
  const init = o.name.replace(/[^a-zа-я0-9]/gi,'').slice(0,2).toUpperCase();
  return <div style={{ display:'flex', alignItems:'center', gap:9 }}>
    <span style={{ width:24, height:24, flexShrink:0, borderRadius:'var(--radius-sm)', display:'inline-flex',
      alignItems:'center', justifyContent:'center', fontFamily:"var(--font-mono)", fontSize:10, fontWeight:600,
      color:o.color, background:'var(--bg)', border:`1px solid ${o.color}55` }}>{init}</span>
    <div style={{ display:'flex', flexDirection:'column', lineHeight:1.2 }}>
      <span style={{ fontFamily:"var(--font-mono)", fontSize:12, color:'var(--fg1)' }}>{o.name}</span>
      <span className="label" style={{ fontSize:9 }}>{o.role}</span>
    </div>
  </div>;
}

function copy(text, cb){ try{ navigator.clipboard.writeText(text).then(cb); }catch(e){ cb&&cb(); } }

Object.assign(window, {
  PERM_GROUPS, PERM_MAP, ALL_PERMS, USER_KEYS, ADMIN_KEYS, OWNERS,
  Icon, StatusDot, Badge, Button, IconBtn, PermCell, Owner, copy, plural,
});

</script>
<script type="text/babel">
function boot(){
if(!(window.ADMIN_KEYS && window.Icon && window.PERM_GROUPS)){ return setTimeout(boot, 30); }
const { Icon, Badge, Button, IconBtn, PermCell, Owner, ADMIN_KEYS, OWNERS, PERM_GROUPS, PERM_MAP, ALL_PERMS, copy, plural } = window;

/* ── Stat card ───────────────────────────────────────────── */
function StatCard({ icon, label, value, tone, hint }) {
  const c = tone==='warn'?'var(--status-warn)':tone==='err'?'var(--status-err)':tone==='ok'?'var(--accent-safe)':'var(--fg1)';
  return <div style={{ flex:1, minWidth:0, background:'var(--panel)', border:'1px solid var(--line)', borderRadius:'var(--radius)', padding:'16px 18px' }}>
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
      <Icon name={icon} size={15} style={{ color: tone?c:'var(--fg2)' }} />
      <span className="label" style={{ fontSize:9 }}>{label}</span>
    </div>
    <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:28, fontWeight:600, lineHeight:1, color:c }}>{String(value).padStart(2,'0')}</span>
      {hint && <span style={{ fontFamily:'var(--font-ui)', fontSize:11, color:'var(--fg3)' }}>{hint}</span>}
    </div>
  </div>;
}

/* ── Filter select ───────────────────────────────────────── */
function Select({ value, onChange, options, width=160, icon }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{ const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h); },[]);
  const cur = options.find(o=>o.v===value) || options[0];
  return <div ref={ref} style={{ position:'relative', width }}>
    <button onClick={()=>setOpen(o=>!o)} style={{ width:'100%', height:32, background:'var(--bg)',
      border:`1px solid ${open?'var(--accent)':'var(--line)'}`, borderRadius:'var(--radius)', padding:'0 10px',
      display:'flex', alignItems:'center', gap:8, cursor:'pointer', color:'var(--fg1)', transition:'border-color .15s' }}>
      {icon && <Icon name={icon} size={14} style={{ color:'var(--fg2)' }} />}
      <span style={{ flex:1, textAlign:'left', fontSize:13, fontFamily:'var(--font-ui)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{cur.l}</span>
      <Icon name="chevron-down" size={14} style={{ color:'var(--fg3)' }} />
    </button>
    {open && <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, zIndex:40, background:'var(--panel-soft)',
      border:'1px solid var(--line)', borderRadius:'var(--radius)', padding:4, maxHeight:260, overflowY:'auto' }}>
      {options.map(o => { const on=o.v===value; return <button key={o.v} onClick={()=>{ onChange(o.v); setOpen(false); }}
        style={{ width:'100%', display:'flex', alignItems:'center', gap:8, padding:'8px 9px', borderRadius:'var(--radius-sm)', border:'none',
          background: on?'var(--accent-soft)':'transparent', color: on?'var(--accent-safe)':'var(--fg1)', cursor:'pointer', textAlign:'left',
          fontFamily:'var(--font-ui)', fontSize:13 }}
        onMouseEnter={e=>{ if(!on) e.currentTarget.style.background='var(--panel-muted)'; }}
        onMouseLeave={e=>{ if(!on) e.currentTarget.style.background='transparent'; }}>
        {o.l}{on && <Icon name="check" size={14} style={{ marginLeft:'auto' }} />}</button>; })}
    </div>}
  </div>;
}

/* ── Policies drawer ─────────────────────────────────────── */
function PoliciesDrawer({ policy, onChange, onClose }) {
  const [draft, setDraft] = React.useState(policy);
  const lifetimes = [{v:30,l:'30 дней'},{v:90,l:'90 дней'},{v:365,l:'1 год'},{v:0,l:'Без ограничения'}];
  const toggleAllowed = id => setDraft(d => ({ ...d, allowed: d.allowed.includes(id) ? d.allowed.filter(x=>x!==id) : [...d.allowed, id] }));
  return <div onMouseDown={onClose} style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(1,4,9,.6)', display:'flex', justifyContent:'flex-end' }}>
    <div onMouseDown={e=>e.stopPropagation()} style={{ width:420, height:'100%', background:'var(--panel)', borderLeft:'1px solid var(--line)',
      display:'flex', flexDirection:'column', animation:'slideIn .22s var(--ease)' }}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', padding:'20px 24px 16px', borderBottom:'1px solid var(--line)' }}>
        <div><div className="label" style={{ marginBottom:6 }}>GOVERNANCE</div><div className="h3">Политики API-ключей</div></div>
        <button onClick={onClose} style={{ width:28, height:28, background:'transparent', border:'none', color:'var(--fg2)', cursor:'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center' }}><Icon name="x" size={18}/></button>
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:24, display:'flex', flexDirection:'column', gap:26 }}>
        <div>
          <div className="label" style={{ marginBottom:6 }}>Максимальный срок жизни</div>
          <p style={{ fontSize:12, color:'var(--fg3)', marginBottom:12, lineHeight:1.5 }}>Новые ключи не смогут получить срок действия дольше указанного. Действующие ключи не затрагиваются.</p>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {lifetimes.map(l => { const on=draft.maxLife===l.v; return <button key={l.v} onClick={()=>setDraft(d=>({...d,maxLife:l.v}))}
              style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', borderRadius:'var(--radius)', cursor:'pointer', textAlign:'left',
                border:`1px solid ${on?'var(--accent-line)':'var(--line)'}`, background:on?'var(--accent-soft)':'var(--bg)', color:'var(--fg1)' }}>
              <span style={{ width:16, height:16, borderRadius:'50%', border:`1px solid ${on?'var(--accent-safe)':'var(--line)'}`, display:'inline-flex', alignItems:'center', justifyContent:'center' }}>
                {on && <span style={{ width:8, height:8, borderRadius:'50%', background:'var(--accent-safe)' }} />}</span>
              <span style={{ fontSize:13, fontFamily:'var(--font-ui)' }}>{l.l}</span></button>; })}
          </div>
        </div>
        <div style={{ height:1, background:'var(--line)' }} />
        <div>
          <div className="label" style={{ marginBottom:6 }}>Разрешённые права</div>
          <p style={{ fontSize:12, color:'var(--fg3)', marginBottom:12, lineHeight:1.5 }}>Права, недоступные для выбора при создании ключей операторами. Снятые права отключены в модальном окне создания.</p>
          {PERM_GROUPS.map(g => <div key={g.group} style={{ marginBottom:14 }}>
            <div className="label" style={{ fontSize:9, marginBottom:8 }}>{g.group}</div>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {g.perms.map(p => { const on=draft.allowed.includes(p.id); const risky=p.id.endsWith(':write')||p.id.endsWith(':apply')||p.id==='webhooks:manage';
                return <div key={p.id} onClick={()=>toggleAllowed(p.id)} style={{ display:'flex', alignItems:'center', gap:10, cursor:'pointer' }}>
                  <span style={{ width:34, height:19, borderRadius:10, background:on?'var(--accent-safe)':'var(--line)', position:'relative', flexShrink:0, transition:'background .15s' }}>
                    <span style={{ position:'absolute', top:2, left:on?17:2, width:15, height:15, borderRadius:'50%', background:'var(--fg1)', transition:'left .15s' }} /></span>
                  <span style={{ flex:1, fontFamily:'var(--font-mono)', fontSize:12, color: on?'var(--fg1)':'var(--fg3)' }}>{p.id}</span>
                  {risky && <span title="Право на запись" style={{ color:'var(--status-warn)', display:'inline-flex' }}><Icon name="alert-triangle" size={13}/></span>}
                </div>; })}
            </div>
          </div>)}
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:10, padding:'16px 24px', borderTop:'1px solid var(--line)' }}>
        <Button variant="ghost" onClick={onClose}>Отмена</Button>
        <Button variant="primary" icon="save" onClick={()=>{ onChange(draft); onClose(); }}>Сохранить политики</Button>
      </div>
    </div>
  </div>;
}

/* ── Confirm ─────────────────────────────────────────────── */
function Confirm({ title, body, confirmLabel, danger, onConfirm, onClose }) {
  return <div onMouseDown={onClose} style={{ position:'fixed', inset:0, zIndex:300, background:'rgba(1,4,9,.72)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
    <div onMouseDown={e=>e.stopPropagation()} style={{ width:420, background:'var(--panel)', border:'1px solid var(--line)', borderRadius:'var(--radius)', padding:24 }}>
      <div style={{ display:'flex', gap:12, marginBottom:16 }}>
        <span style={{ width:32, height:32, flexShrink:0, borderRadius:'var(--radius)', display:'inline-flex', alignItems:'center', justifyContent:'center',
          background: danger?'rgba(248,81,73,.1)':'var(--accent-soft)', border:`1px solid ${danger?'rgba(248,81,73,.4)':'var(--accent-line)'}`, color: danger?'var(--status-err)':'var(--accent-safe)' }}>
          <Icon name={danger?'alert-triangle':'info'} size={17}/></span>
        <div><div className="h3" style={{ fontSize:15, marginBottom:4 }}>{title}</div><div style={{ fontSize:12.5, color:'var(--fg2)', lineHeight:1.5 }}>{body}</div></div>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:10 }}>
        <Button variant="ghost" onClick={onClose}>Отмена</Button>
        <Button variant={danger?'destructive':'primary'} onClick={onConfirm}>{confirmLabel}</Button>
      </div>
    </div>
  </div>;
}

/* ── Table cells ─────────────────────────────────────────── */
const TH = { textAlign:'left', padding:'0 14px', height:38, fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'.1em', textTransform:'uppercase',
  color:'var(--fg3)', fontWeight:500, whiteSpace:'nowrap', borderBottom:'1px solid var(--line)', position:'sticky', top:0, background:'var(--panel-muted)', zIndex:5 };
const TD = { padding:'0 14px', height:54, borderBottom:'1px solid var(--line)', verticalAlign:'middle', whiteSpace:'nowrap' };

function Check({ on, onClick, indeterminate }) {
  return <span onClick={onClick} style={{ width:16, height:16, flexShrink:0, borderRadius:'var(--radius-sm)', cursor:'pointer',
    border:`1px solid ${on||indeterminate?'var(--accent-safe)':'var(--line)'}`, background:on||indeterminate?'var(--accent-safe)':'transparent',
    display:'inline-flex', alignItems:'center', justifyContent:'center', color:'#04140F', fontSize:11, fontWeight:700 }}>
    {on?'✓':indeterminate?'–':''}</span>;
}

function AdminRow({ k, selected, onSel, onRevoke, onAudit }) {
  const dead = k.status!=='active';
  return <tr className={'arow'+(selected?' sel':'')}>
    <td style={{ ...TD, paddingLeft:18, width:36 }}><Check on={selected} onClick={()=>onSel(k.id)} /></td>
    <td style={{ ...TD }}><Owner id={k.owner} /></td>
    <td style={{ ...TD, opacity:dead?.55:1 }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <span style={{ width:7, height:7, borderRadius:'50%', flexShrink:0, background: k.status==='active'?'var(--status-ok)':(k.status==='revoked'?'var(--status-err)':'var(--status-off)'),
          animation: k.status==='active'?'pulse 2.4s var(--ease) infinite':'none' }} />
        <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:13, color:'var(--fg1)' }}>{k.name}</span>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)' }}>{k.prefix}…</span>
        </div>
      </div>
    </td>
    <td style={{ ...TD, opacity:dead?.55:1 }}>
      {k.status==='active' ? (k.expiringSoon ? <Badge status="warn">Скоро истечёт</Badge> : <Badge status="active" />) : <Badge status={k.status} />}
    </td>
    <td style={{ ...TD, opacity:dead?.55:1 }}><PermCell perms={k.perms} /></td>
    <td style={{ ...TD, fontFamily:'var(--font-mono)', fontSize:12, color: k.expiringSoon?'var(--status-warn)':(k.expires?'var(--fg2)':'var(--fg3)'), opacity:dead?.55:1 }}>{k.expires||'бессрочный'}</td>
    <td style={{ ...TD, fontFamily:'var(--font-mono)', fontSize:12, color: k.status==='active'?'var(--fg1)':'var(--fg3)', opacity:dead?.55:1 }}>{k.last}</td>
    <td style={{ ...TD, textAlign:'right', paddingRight:16 }}>
      <div style={{ display:'inline-flex', gap:2 }}>
        <IconBtn icon="file-text" title="Журнал аудита" onClick={()=>onAudit(k)} />
        {!dead && <IconBtn icon="slash" title="Отозвать" danger onClick={()=>onRevoke([k.id])} />}
      </div>
    </td>
  </tr>;
}

/* ── Page ────────────────────────────────────────────────── */
function App() {
  const [keys, setKeys] = React.useState(ADMIN_KEYS);
  const [owner, setOwner] = React.useState('all');
  const [status, setStatus] = React.useState('all');
  const [perm, setPerm] = React.useState('all');
  const [q, setQ] = React.useState('');
  const [sel, setSel] = React.useState(()=>new Set());
  const [confirm, setConfirm] = React.useState(null);
  const [drawer, setDrawer] = React.useState(false);
  const [audit, setAudit] = React.useState(null);
  const [policy, setPolicy] = React.useState({ maxLife:365, allowed:ALL_PERMS });

  const filtered = keys.filter(k =>
    (owner==='all'||k.owner===owner) &&
    (status==='all'||k.status===status||(status==='expiring'&&k.expiringSoon&&k.status==='active')) &&
    (perm==='all'||k.perms.includes(perm)) &&
    (q===''||k.name.toLowerCase().includes(q.toLowerCase())||k.owner.toLowerCase().includes(q.toLowerCase())));

  const stats = {
    total: keys.length,
    active: keys.filter(k=>k.status==='active').length,
    expiring: keys.filter(k=>k.expiringSoon&&k.status==='active').length,
    revoked: keys.filter(k=>k.status==='revoked'||k.status==='expired').length,
  };
  const selectableIds = filtered.filter(k=>k.status==='active').map(k=>k.id);
  const allSel = selectableIds.length>0 && selectableIds.every(id=>sel.has(id));
  const someSel = selectableIds.some(id=>sel.has(id)) && !allSel;
  const toggleAll = () => setSel(allSel ? new Set() : new Set(selectableIds));
  const toggleOne = id => setSel(s=>{ const n=new Set(s); n.has(id)?n.delete(id):n.add(id); return n; });

  const revoke = ids => setConfirm({
    danger:true, title: ids.length>1?`Отозвать ${ids.length} ${plural(ids.length)==='право'?'ключ':'ключа/ключей'}?`:'Отозвать ключ?',
    body: <>Выбранны{ids.length>1?'е':'й'} ключ{ids.length>1?'и':''} немедленно прекрат{ids.length>1?'ят':'ит'} работу. Все запросы получат <span className="code">401</span>. Действие необратимо и фиксируется в журнале аудита.</>,
    confirmLabel:'Отозвать', onConfirm:()=>{ setKeys(ks=>ks.map(x=>ids.includes(x.id)?{...x,status:'revoked',expires:'отозван '+today(),expiringSoon:false,last:'—'}:x)); setSel(new Set()); setConfirm(null); }
  });
  function today(){ return new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}); }

  const ownerOpts = [{v:'all',l:'Все владельцы'}, ...Object.keys(OWNERS).map(o=>({v:o,l:OWNERS[o].name}))];
  const statusOpts = [{v:'all',l:'Любой статус'},{v:'active',l:'Активные'},{v:'expiring',l:'Скоро истекут'},{v:'expired',l:'Истёкшие'},{v:'revoked',l:'Отозванные'}];
  const permOpts = [{v:'all',l:'Любые права'}, ...ALL_PERMS.map(p=>({v:p,l:p}))];

  return <div style={{ maxWidth:1240, margin:'0 auto', padding:'28px 32px 64px' }}>
    {/* header */}
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16, fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)' }}>
      <span>Администрирование</span><Icon name="chevron-right" size={13}/><span style={{ color:'var(--fg2)' }}>Безопасность</span>
      <Icon name="chevron-right" size={13}/><span style={{ color:'var(--accent-safe)' }}>API-ключи</span>
    </div>
    <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:24, marginBottom:22 }}>
      <div>
        <h1 className="h1" style={{ marginBottom:8 }}>API-ключи · все пользователи</h1>
        <p style={{ fontSize:13.5, color:'var(--fg2)', maxWidth:600, lineHeight:1.5 }}>
          Централизованное управление программным доступом по всей платформе. Отзыв, аудит и политики выдачи ключей.
        </p>
      </div>
      <Button variant="secondary" icon="sliders" onClick={()=>setDrawer(true)}>Политики</Button>
    </div>

    {/* stats */}
    <div style={{ display:'flex', gap:14, marginBottom:24 }}>
      <StatCard icon="key" label="Всего ключей" value={stats.total} />
      <StatCard icon="activity" label="Активных" value={stats.active} tone="ok" />
      <StatCard icon="clock" label="Скоро истекут" value={stats.expiring} tone={stats.expiring?'warn':null} hint="≤14 дней" />
      <StatCard icon="slash" label="Отозвано / истекло" value={stats.revoked} tone="err" />
    </div>

    {/* toolbar */}
    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14, flexWrap:'wrap' }}>
      <div style={{ position:'relative', flex:'1 1 240px', minWidth:200 }}>
        <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:'var(--fg3)', display:'inline-flex' }}><Icon name="search" size={15}/></span>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Поиск по имени или владельцу…"
          style={{ width:'100%', height:32, background:'var(--bg)', border:'1px solid var(--line)', borderRadius:'var(--radius)',
            padding:'0 12px 0 32px', fontFamily:'var(--font-ui)', fontSize:13, color:'var(--fg1)', outline:'none' }}
          onFocus={e=>{e.target.style.borderColor='var(--accent)';e.target.style.boxShadow='var(--focus-ring)';}}
          onBlur={e=>{e.target.style.borderColor='var(--line)';e.target.style.boxShadow='none';}} />
      </div>
      <Select value={owner} onChange={setOwner} options={ownerOpts} icon="user" width={170} />
      <Select value={status} onChange={setStatus} options={statusOpts} icon="filter" width={160} />
      <Select value={perm} onChange={setPerm} options={permOpts} icon="shield" width={170} />
    </div>

    {/* bulk bar */}
    {sel.size>0 && <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 16px', marginBottom:12,
      background:'var(--accent-soft)', border:'1px solid var(--accent-line)', borderRadius:'var(--radius)' }}>
      <span style={{ fontFamily:'var(--font-mono)', fontSize:13, color:'var(--accent-safe)' }}>Выбрано ключей: {sel.size}</span>
      <div style={{ display:'flex', gap:10 }}>
        <Button variant="ghost" size="sm" onClick={()=>setSel(new Set())}>Снять выделение</Button>
        <Button variant="destructive" size="sm" icon="slash" onClick={()=>revoke([...sel])}>Отозвать выбранные</Button>
      </div>
    </div>}

    {/* table */}
    <div style={{ border:'1px solid var(--line)', borderRadius:'var(--radius)', overflow:'hidden', background:'var(--panel)' }}>
      <div style={{ overflowX:'auto' }}>
        <table style={{ width:'100%', borderCollapse:'collapse', minWidth:1040 }}>
          <thead><tr>
            <th style={{ ...TH, paddingLeft:18, width:36 }}><Check on={allSel} indeterminate={someSel} onClick={toggleAll} /></th>
            <th style={TH}>Владелец</th>
            <th style={TH}>Ключ</th>
            <th style={TH}>Статус</th>
            <th style={TH}>Права</th>
            <th style={TH}>Истекает</th>
            <th style={TH}>Активность</th>
            <th style={{ ...TH, textAlign:'right', paddingRight:16 }}></th>
          </tr></thead>
          <tbody>
            {filtered.length===0
              ? <tr><td colSpan={8} style={{ padding:'48px', textAlign:'center', color:'var(--fg3)', fontSize:13 }}>
                  <img src="../assets/bit-mascot.svg" width="56" height="56" alt="Бит" style={{ opacity:.7, marginBottom:14, display:'block', marginLeft:'auto', marginRight:'auto' }} />
                  Ничего не найдено по заданным фильтрам.</td></tr>
              : filtered.map(k => <AdminRow key={k.id} k={k} selected={sel.has(k.id)} onSel={toggleOne} onRevoke={revoke} onAudit={setAudit} />)}
          </tbody>
        </table>
      </div>
    </div>
    <div style={{ marginTop:14, display:'flex', alignItems:'center', justifyContent:'space-between', fontSize:12, color:'var(--fg3)' }}>
      <span>Показано {filtered.length} из {keys.length}</span>
      <span style={{ display:'flex', alignItems:'center', gap:8 }}><Icon name="shield" size={13} style={{ color:'var(--accent-safe)' }}/> макс. срок жизни: {policy.maxLife?policy.maxLife+' дн.':'без ограничения'} · разрешено прав: {policy.allowed.length}/{ALL_PERMS.length}</span>
    </div>

    {drawer && <PoliciesDrawer policy={policy} onChange={setPolicy} onClose={()=>setDrawer(false)} />}
    {confirm && <Confirm {...confirm} onClose={()=>setConfirm(null)} />}
    {audit && <AuditDrawer k={audit} onClose={()=>setAudit(null)} />}
  </div>;
}

/* ── Audit drawer ────────────────────────────────────────── */
function AuditDrawer({ k, onClose }) {
  const events = [
    { t:'09.06.2026 14:22', ev:'key.used', actor:k.owner, meta:'GET /api/v2/devices · 200', tone:null },
    { t:'09.06.2026 09:01', ev:'key.used', actor:k.owner, meta:'GET /api/v2/metrics · 200', tone:null },
    { t:'02.05.2026 11:40', ev:'key.permissions.viewed', actor:'root', meta:'admin console', tone:'info' },
    { t:k.created+' 08:15', ev:'key.created', actor:k.owner, meta:`${k.perms.length} ${plural(k.perms.length)}`, tone:'ok' },
  ];
  const evColor = t => t==='ok'?'var(--accent-safe)':t==='info'?'var(--status-info)':t==='err'?'var(--status-err)':'var(--fg2)';
  return <div onMouseDown={onClose} style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(1,4,9,.6)', display:'flex', justifyContent:'flex-end' }}>
    <div onMouseDown={e=>e.stopPropagation()} style={{ width:440, height:'100%', background:'var(--panel)', borderLeft:'1px solid var(--line)', display:'flex', flexDirection:'column', animation:'slideIn .22s var(--ease)' }}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', padding:'20px 24px 16px', borderBottom:'1px solid var(--line)' }}>
        <div><div className="label" style={{ marginBottom:6 }}>AUDIT LOG</div>
          <div className="h3" style={{ fontFamily:'var(--font-mono)', fontSize:15 }}>{k.name}</div>
          <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)', marginTop:4 }}>{k.prefix}… · {k.owner}</div></div>
        <button onClick={onClose} style={{ width:28, height:28, background:'transparent', border:'none', color:'var(--fg2)', cursor:'pointer', display:'inline-flex', alignItems:'center', justifyContent:'center' }}><Icon name="x" size={18}/></button>
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:'8px 0' }}>
        {events.map((e,i) => <div key={i} style={{ display:'flex', gap:14, padding:'14px 24px', borderBottom:'1px solid var(--line-soft)' }}>
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', paddingTop:3 }}>
            <span style={{ width:8, height:8, borderRadius:'50%', background:evColor(e.tone), flexShrink:0 }} />
            {i<events.length-1 && <span style={{ width:1, flex:1, background:'var(--line)', marginTop:4 }} />}
          </div>
          <div style={{ flex:1 }}>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:12.5, color:evColor(e.tone), marginBottom:3 }}>{e.ev}</div>
            <div style={{ fontFamily:'var(--font-ui)', fontSize:12, color:'var(--fg2)', marginBottom:3 }}>{e.meta}</div>
            <div style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)' }}>{e.t} · {e.actor}</div>
          </div>
        </div>)}
      </div>
      <div style={{ padding:'14px 24px', borderTop:'1px solid var(--line)', fontSize:11, color:'var(--fg3)', display:'flex', alignItems:'center', gap:8 }}>

}
