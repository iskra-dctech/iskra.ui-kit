<!DOCTYPE html>
<!-- @dsCard group="Components" name="Toasts" subtitle="Drift / OK / Error / Info — left status stripe" viewport="700x240" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:22px;display:flex;flex-direction:column;gap:9px}
.toast{border-radius:4px;background:#161B22;border:1px solid #30363D;border-left:3px solid;padding:10px 14px;display:flex;align-items:flex-start;gap:10px}
.warn{border-left-color:#F97316}.ok{border-left-color:#00FFC2}.err{border-left-color:#F85149}.info{border-left-color:#58A6FF}
.icon{width:16px;height:16px;border-radius:50%;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.warn .icon{background:rgba(249,115,22,.15);color:#F97316}
.ok .icon{background:rgba(0,255,194,.12);color:#00FFC2}
.err .icon{background:rgba(248,81,73,.15);color:#F85149}
.info .icon{background:rgba(88,166,255,.15);color:#58A6FF}
.tt{font-size:12px;font-weight:600;color:#F0F6FC;margin-bottom:2px}
.tb{font-size:11px;color:#8B949E;font-weight:300}
</style></head><body>
<div class="toast warn"><div class="icon">!</div><div><div class="tt">Drift обнаружен</div><div class="tb">leaf-07.msk расходится с Desired State</div></div></div>
<div class="toast ok"><div class="icon">✓</div><div><div class="tt">Синхронизировано</div><div class="tb">spine-01.msk · 142 ms</div></div></div>
<div class="toast err"><div class="icon">✕</div><div><div class="tt">Потеря связи</div><div class="tb">Брокер драйверов недоступен. Retry через 3s</div></div></div>
<div class="toast info"><div class="icon">i</div><div><div class="tt">Обновление прошивки доступно</div><div class="tb">leaf-09.spb · v2.4.1 → v2.5.0 · запланировать в окно обслуживания</div></div></div>
</body></html>
