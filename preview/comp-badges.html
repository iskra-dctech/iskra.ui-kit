<!DOCTYPE html>
<!-- @dsCard group="Components" name="Status badges & tags" subtitle="Signal badges + mono tags" viewport="700x170" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 10px;border-radius:3px;border:1px solid}
.dot{width:6px;height:6px;border-radius:50%}
.ok{color:#00FFC2;border-color:rgba(0,255,194,.4);background:rgba(0,255,194,.08)}
.warn{color:#F97316;border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.08)}
.err{color:#F85149;border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.08)}
.off{color:#8B949E;border-color:#30363D;background:#161B22}
.info{color:#58A6FF;border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.08)}
.tag{font-family:'JetBrains Mono',monospace;font-size:10px;color:#8B949E;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:2px 6px;letter-spacing:.04em}
</style></head><body>
<span class="badge ok"><span class="dot" style="background:#00FFC2"></span>Sync</span>
<span class="badge warn"><span class="dot" style="background:#F97316"></span>Drift</span>
<span class="badge err"><span class="dot" style="background:#F85149"></span>Error</span>
<span class="badge off"><span class="dot" style="background:#6E7681"></span>Offline</span>
<span class="badge info"><span class="dot" style="background:#58A6FF"></span>Maintenance</span>
<span style="width:100%;height:1px;background:#30363D;margin:6px 0"></span>
<span class="tag">spine</span><span class="tag">prod</span><span class="tag">leaf</span><span class="tag">drift</span><span class="tag">msk-dc1</span>
</body></html>
