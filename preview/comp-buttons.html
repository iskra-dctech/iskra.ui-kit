<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / Secondary / Destructive · hover · disabled" viewport="700x270" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:24px;color:#F0F6FC}
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#6E7681;margin:0 0 12px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.row:last-child{margin-bottom:0}
.btn{height:32px;padding:0 16px;border-radius:4px;font-family:'Inter';font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:7px;border:1px solid;background:transparent;cursor:pointer}
.primary{border-color:#00FFC2;color:#00FFC2}
.primary.h{background:rgba(0,255,194,.12)}
.secondary{border-color:#30363D;color:#F0F6FC}
.secondary.h{border-color:#00FFC2;color:#00FFC2}
.destructive{border-color:#F85149;color:#F85149}
.destructive.h{background:rgba(248,81,73,.1)}
.disabled{border-color:#30363D;color:#6E7681;cursor:not-allowed;opacity:.55}
.tag{font-family:'JetBrains Mono';font-size:10px;color:#6E7681;margin-left:4px}
</style></head><body>
<p class="lbl">Default</p>
<div class="row">
  <button class="btn primary">⟳ Force Sync</button>
  <button class="btn secondary">Детали</button>
  <button class="btn destructive">Power Reset</button>
</div>
<p class="lbl">Hover / Active</p>
<div class="row">
  <button class="btn primary h">⟳ Force Sync</button>
  <button class="btn secondary h">Детали</button>
  <button class="btn destructive h">Power Reset</button>
</div>
<p class="lbl">Disabled · заблокирована</p>
<div class="row">
  <button class="btn primary disabled" disabled>⟳ Force Sync</button>
  <button class="btn secondary disabled" disabled>Детали</button>
  <span class="tag">недоступно: устройство offline</span>
</div>
</body></html>
