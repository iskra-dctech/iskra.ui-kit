/* ===== inlined colors_and_type.css ===== */
/* ============================================================
   ИСКРА.DCI — Design Tokens · Colors & Type
   Hard-Shell Minimal · technical minimalism, single accent hue
   Root font-size is INTENTIONALLY 14px (data-dense product).
   Load Inter + JetBrains Mono before this file.
   ============================================================ */

@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}

:root {
  /* ---- DARK THEME (primary / default) ------------------- */
  --bg:            #0D1117;  /* Anthracite Deep — global page bg   */
  --panel:         #161B22;  /* Elevated Graphite — cards, modals  */
  --panel-soft:    #1D2530;  /* slightly raised insets             */
  --panel-muted:   #202A35;  /* table headers, hover fills         */
  --line:          #30363D;  /* borders, dividers (1px everywhere) */
  --line-soft:     rgba(48,54,61,.5);

  --fg1:           #F0F6FC;  /* primary text                       */
  --fg2:           #8B949E;  /* secondary text, placeholders       */
  --fg3:           #6E7681;  /* tertiary / disabled                */

  /* ---- ACCENT · Cyber Mint ------------------------------ */
  --accent:        #00FFC2;  /* indicators, borders, focus ONLY    */
  --accent-hover:  #00CC9A;  /* hover for icons/borders            */
  --accent-safe:   #00AA85;  /* AA-safe accent for TEXT on dark    */
  --accent-soft:   rgba(0,170,133,.14);
  --accent-line:   rgba(0,170,133,.32);

  /* ---- STATUS MODEL (signal only, never decorative) ----- */
  --status-ok:     #00FFC2;  /* Sync / Online                      */
  --status-warn:   #F97316;  /* Drift / Warning                    */
  --status-err:    #F85149;  /* Error / Critical                   */
  --status-off:    #6E7681;  /* Maintenance / Inactive             */
  --status-info:   #58A6FF;  /* Info / Neutral (used minimally)    */

  /* ---- TYPE FAMILIES ------------------------------------ */
  --font-ui:       'Inter', system-ui, -apple-system, sans-serif;
  --font-display:  'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:     'JetBrains Mono', ui-monospace, 'SF Mono', monospace;

  /* ---- TYPE SCALE (px on a 14px root) ------------------- */
  --text-h1:       24px;   --lh-h1: 1.2; /* @kind font */  --wt-h1: 600; /* @kind font */
  --text-h2:       20px;   --lh-h2: 1.2; /* @kind font */  --wt-h2: 600; /* @kind font */
  --text-h3:       18px;   --lh-h3: 1.2; /* @kind font */  --wt-h3: 600; /* @kind font */
  --text-ui:       14px;   --lh-ui: 1.4; /* @kind font */  --wt-ui: 400; /* @kind font */
  --text-ui-med:   14px;                   --wt-ui-med: 500; /* @kind font */
  --text-small:    12px;   --lh-sm: 1.4; /* @kind font */
  --text-mono:     13px;   --lh-mono: 1.45; /* @kind font */
  --text-label:    11px;   /* mono uppercase eyebrows         */

  /* ---- SPACING · 8px base (4px for micro) --------------- */
  --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
  --s5: 24px; --s6: 32px; --s7: 48px; --s8: 64px;

  /* ---- RADIUS · fixed 4px everywhere -------------------- */
  --radius: 4px;
  --radius-sm: 2px;

  /* ---- BORDERS / ELEVATION ------------------------------ */
  /* No shadows. Layers separated by a single 1px border.   */
  --border: 1px solid var(--line);
  --focus-ring: 0 0 0 1px var(--accent);

  /* ---- MOTION ------------------------------------------- */
  --ease: cubic-bezier(.2,.6,.2,1); /* @kind other */
  --dur: .15s; /* @kind other */

  /* ---- CONTROL SIZES ------------------------------------ */
  --control-h: 32px;
  --control-h-lg: 36px;
}

/* ============================================================
   COLD LIGHT THEME  (off-white, neutral) — apply .theme-cold
   ============================================================ */
.theme-cold {
  --bg:#EEF2F7; --panel:#E2E8F0; --panel-soft:#E9EEF4; --panel-muted:#DCE3EC;
  --line:#CDD5E0; --line-soft:rgba(205,213,224,.6);
  --fg1:#1C2128; --fg2:#57606A; --fg3:#8B949E;
  --accent:#00AA85; --accent-hover:#009478; --accent-safe:#008268;
  --accent-soft:#E6F7F2; --accent-line:rgba(0,170,133,.32);
  --status-ok:#00AA85; --status-warn:#D0610A; --status-err:#D0302A;
  --status-off:#6E7681; --status-info:#2E6DA4;
}

/* ============================================================
   WARM LIGHT THEME  (paper / sand) — apply .theme-warm
   ============================================================ */
.theme-warm {
  --bg:#F5F0E8; --panel:#EDE8DF; --panel-soft:#F0EBE3; --panel-muted:#E4DED3;
  --line:#D8D2C8; --line-soft:rgba(216,210,200,.6);
  --fg1:#1C1A17; --fg2:#6B6560; --fg3:#9A948C;
  --accent:#009B78; --accent-hover:#008268; --accent-safe:#00795D;
  --accent-soft:#E8F5F0; --accent-line:rgba(0,155,120,.32);
  --status-ok:#009B78; --status-warn:#C2620A; --status-err:#C23B36;
  --status-off:#7A756E; --status-info:#3A6FA8;
}

/* ============================================================
   SEMANTIC ELEMENT STYLES
   ============================================================ */
.iskra-scope { font-size:14px; }          /* enforce 14px root      */

.h1 { font-family:var(--font-display); font-size:var(--text-h1); line-height:var(--lh-h1); font-weight:var(--wt-h1); letter-spacing:-.02em; color:var(--fg1); }
.h2 { font-family:var(--font-display); font-size:var(--text-h2); line-height:var(--lh-h2); font-weight:var(--wt-h2); letter-spacing:-.02em; color:var(--fg1); }
.h3 { font-family:var(--font-display); font-size:var(--text-h3); line-height:var(--lh-h3); font-weight:var(--wt-h3); letter-spacing:-.01em; color:var(--fg1); }
.p  { font-family:var(--font-ui); font-size:var(--text-ui); line-height:var(--lh-ui); color:var(--fg1); }
.small { font-size:var(--text-small); line-height:var(--lh-sm); color:var(--fg2); }
.mono { font-family:var(--font-mono); font-size:var(--text-mono); line-height:var(--lh-mono); color:var(--fg1); }
.code { font-family:var(--font-mono); font-size:var(--text-mono); color:var(--accent-safe); }

/* mono uppercase eyebrow / section label */
.label {
  font-family:var(--font-mono);
  font-size:var(--text-label);
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--fg2);
}

</style>

</style>

/* ===== inlined apikeys-shared.jsx ===== */

const ALL_PERMS = Object.keys(PERM_MAP);

/* ─────────────── Mock keys ─────────────── */

];

const OWNERS = {
  'anna.k':   { name:'anna.k',   role:'operator', color:'#58A6FF' },
  'dmitry.v': { name:'dmitry.v', role:'operator', color:'#00AA85' },

  { id:'a3', owner:'dmitry.v', name:'grafana-readonly',   prefix:'isk_live_e0c4', status:'active', expiringSoon:true,

  { id:'a8', owner:'dmitry.v', name:'old-webhook',        prefix:'isk_live_55de', status:'revoked',

/* ─────────────── Primitives ─────────────── */
function Icon({ name, size = 16, strokeWidth = 1.5, style }) {
  const svg = (window.feather && window.feather.icons[name])
    ? window.feather.icons[name].toSvg({ width:size, height:size, 'stroke-width':strokeWidth })
    : '';
  return <span aria-hidden="true" style={{ display:'inline-flex', ...style }}
    dangerouslySetInnerHTML={{ __html: svg }} />;
}

const DOT = { active:'var(--status-ok)', expired:'var(--status-off)', revoked:'var(--status-err)' };
function StatusDot({ status='active', size=8 }) {
  return <span style={{ width:size, height:size, borderRadius:'50%', background:DOT[status]||DOT.active, flexShrink:0, display:'inline-block' }} />;
}

const BADGE = {
  active:  { c:'var(--status-ok)',   b:'rgba(0,255,194,.4)', bg:'rgba(0,255,194,.08)',  t:'Активен' },
  expired: { c:'var(--fg2)',         b:'var(--line)',        bg:'var(--panel)',         t:'Истёк' },
  revoked: { c:'var(--status-err)',  b:'rgba(248,81,73,.4)', bg:'rgba(248,81,73,.08)',  t:'Отозван' },
  warn:    { c:'var(--status-warn)', b:'rgba(249,115,22,.4)',bg:'rgba(249,115,22,.08)', t:'' },
  info:    { c:'var(--status-info)', b:'rgba(88,166,255,.4)',bg:'rgba(88,166,255,.08)', t:'' },
};
function Badge({ status='active', children }) {
  const m = BADGE[status] || BADGE.active;
  const dot = { active:'var(--status-ok)', expired:'var(--status-off)', revoked:'var(--status-err)', warn:'var(--status-warn)', info:'var(--status-info)' }[status];
  return <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:"var(--font-ui)", fontSize:11, fontWeight:500,
    padding:'3px 8px', borderRadius:'var(--radius-sm)', border:`1px solid ${m.b}`, color:m.c, background:m.bg, whiteSpace:'nowrap' }}>
    <span style={{ width:5, height:5, borderRadius:'50%', background:dot }} />{children || m.t}
  </span>;
}

function Button({ variant='secondary', icon, children, onClick, disabled, size='md', style }) {
  const [h, setH] = React.useState(false);
  const base = { height: size==='sm'?28:32, padding: size==='sm'?'0 12px':'0 16px', borderRadius:'var(--radius)',
    fontFamily:"var(--font-ui)", fontSize:13, fontWeight:500, display:'inline-flex', alignItems:'center', gap:7,
    border:'1px solid', background:'transparent', cursor:disabled?'not-allowed':'pointer',
    transition:'background .15s,color .15s,border-color .15s', opacity:disabled?.4:1, whiteSpace:'nowrap' };
  const V = {
    primary:    { borderColor:'var(--accent)', color:'var(--accent)', background:(h&&!disabled)?'rgba(0,255,194,.12)':'transparent' },
    secondary:  { borderColor:(h&&!disabled)?'var(--accent)':'var(--line)', color:(h&&!disabled)?'var(--accent)':'var(--fg1)' },
    destructive:{ borderColor:'var(--status-err)', color:'var(--status-err)', background:(h&&!disabled)?'rgba(248,81,73,.1)':'transparent' },
    ghost:      { borderColor:'transparent', color:(h&&!disabled)?'var(--accent)':'var(--fg2)' },
  };
  return <button onClick={disabled?undefined:onClick} disabled={disabled}
    onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{ ...base, ...V[variant], ...style }}>
    {icon && <Icon name={icon} size={15} />}{children}
  </button>;
}

// small square icon-only action button used in table rows
function IconBtn({ icon, title, danger, onClick }) {
  const [h, setH] = React.useState(false);
  const color = danger ? 'var(--status-err)' : (h ? 'var(--accent)' : 'var(--fg2)');
  return <button title={title} onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{ width:28, height:28, display:'inline-flex', alignItems:'center', justifyContent:'center',
      border:`1px solid ${h?(danger?'rgba(248,81,73,.4)':'var(--accent)'):'transparent'}`,
      borderRadius:'var(--radius)', background: h?(danger?'rgba(248,81,73,.08)':'var(--accent-soft)'):'transparent',
      color, cursor:'pointer', transition:'all .15s' }}>
    <Icon name={icon} size={15} />
  </button>;
}

// permissions count chip with a hover tooltip listing scopes
function PermCell({ perms }) {
  const [open, setOpen] = React.useState(false);
  const isAll = perms.length === ALL_PERMS.length;
  return <span style={{ position:'relative', display:'inline-flex' }}
    onMouseEnter={()=>setOpen(true)} onMouseLeave={()=>setOpen(false)}>
    <span style={{ display:'inline-flex', alignItems:'center', gap:6, fontFamily:"var(--font-mono)", fontSize:11,

        <span style={{ color:'var(--accent-safe)' }}>›</span> {p}
      </span>)}
    </div>}
  </span>;
}
function plural(n){ const a=n%10,b=n%100; if(a===1&&b!==11)return'право'; if(a>=2&&a<=4&&(b<10||b>=20))return'права'; return'прав'; }

// owner avatar (initials)
function Owner({ id }) {
  const o = OWNERS[id] || { name:id, role:'', color:'var(--fg2)' };
  const init = o.name.replace(/[^a-zа-я0-9]/gi,'').slice(0,2).toUpperCase();
  return <div style={{ display:'flex', alignItems:'center', gap:9 }}>

    <div style={{ display:'flex', flexDirection:'column', lineHeight:1.2 }}>
      <span style={{ fontFamily:"var(--font-mono)", fontSize:12, color:'var(--fg1)' }}>{o.name}</span>
      <span className="label" style={{ fontSize:9 }}>{o.role}</span>
    </div>
  </div>;
}

function copy(text, cb){ try{ navigator.clipboard.writeText(text).then(cb); }catch(e){ cb&&cb(); } }

Object.assign(window, {

});

/* ===== inlined apikeys-create-modal.jsx ===== */
/* ИСКРА.DCI — Create API Key modal (React). Exports CreateKeyModal to window. */
(function(){
const { Icon, Button, PERM_GROUPS, ALL_PERMS, plural } = window;

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
function ymd(d){ return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}); }

function DatePicker({ value, onChange }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const [open, setOpen] = React.useState(false);
  const [view, setView] = React.useState(()=> new Date(today.getFullYear(), today.getMonth(), 1));
  const ref = React.useRef(null);
  React.useEffect(()=>{
    const h = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h); return ()=>document.removeEventListener('mousedown', h);
  },[]);
  const y = view.getFullYear(), m = view.getMonth();
  const first = new Date(y, m, 1);
  const startDow = (first.getDay()+6)%7; // Mon=0
  const days = new Date(y, m+1, 0).getDate();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(new Date(y, m, d));

  const presets = [
    { label:'30 дней', days:30 }, { label:'90 дней', days:90 },

          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--line)'; e.currentTarget.style.color='var(--fg2)';}}>
          {p.label}</button>)}
      </div>

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>

        <button onClick={()=>setView(new Date(y, m+1, 1))} style={navBtn}><Icon name="chevron-right" size={16}/></button>

        {cells.map((d,i) => {
          if(!d) return <span key={i} />;

              background: sel?'var(--accent-soft)':'transparent', color: past?'var(--fg3)':(sel?'var(--accent-safe)':'var(--fg1)'),
              opacity:past?.4:1, transition:'all .12s' }}
            onMouseEnter={e=>{ if(!past&&!sel) e.currentTarget.style.background='var(--panel-muted)'; }}
            onMouseLeave={e=>{ if(!sel) e.currentTarget.style.background='transparent'; }}>
            {d.getDate()}</button>;
        })}
      </div>
    </div>}
  </div>;
}
const navBtn = { width:28, height:28, display:'inline-flex', alignItems:'center', justifyContent:'center',
  background:'transparent', border:'1px solid var(--line)', borderRadius:'var(--radius-sm)', color:'var(--fg2)', cursor:'pointer' };

                      <span style={{ fontFamily:'var(--font-ui)', fontSize:11, color:'var(--fg3)', lineHeight:1.35 }}>{p.desc}</span>

        <div style={{ display:'flex', gap:10 }}>
          <Button variant="ghost" onClick={onClose}>Отмена</Button>

        </div>
      </div>
    </div>
  </div>;
}
const linkBtn = c => ({ background:'transparent', border:'none', cursor:'pointer', fontFamily:'var(--font-ui)',
  fontSize:12, fontWeight:500, color:c, padding:0 });

window.CreateKeyModal = CreateKeyModal;
window.fmtToday = ()=> ymd(new Date());
})();

</script>
<script type="text/babel">
function boot(){
if(!(window.USER_KEYS && window.CreateKeyModal && window.Icon)){ return setTimeout(boot, 30); }
const { Icon, Badge, Button, IconBtn, PermCell, USER_KEYS, PERM_MAP, copy, plural, CreateKeyModal } = window;

/* ── One-time secret reveal banner ───────────────────────────── */
function SecretReveal({ data, onDismiss }) {
  const [shown, setShown] = React.useState(false);
  const [copied, setCopied] = React.useState(false);
  const secret = data.secret;
  const masked = secret.slice(0,12) + '•'.repeat(20);
  return <div style={{ animation:'slideDown .2s var(--ease)', border:'1px solid var(--accent-line)',
    background:'linear-gradient(180deg,var(--accent-soft),transparent)', borderRadius:'var(--radius)', padding:'18px 20px', marginBottom:20 }}>
    <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
      <span style={{ width:32, height:32, flexShrink:0, borderRadius:'var(--radius)', display:'inline-flex', alignItems:'center',
        justifyContent:'center', background:'var(--accent-soft)', border:'1px solid var(--accent-line)', color:'var(--accent-safe)' }}>
        <Icon name="check" size={18}/></span>
      <div style={{ flex:1 }}>
        <div className="h3" style={{ fontSize:15, marginBottom:3 }}>Ключ «{data.name}» создан</div>
        <div style={{ fontSize:12, color:'var(--fg2)', lineHeight:1.5, marginBottom:14 }}>
          Скопируйте секрет сейчас — он показывается <b style={{ color:'var(--status-warn)' }}>только один раз</b> и не хранится в открытом виде.
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <div style={{ flex:1, height:38, background:'var(--bg)', border:'1px solid var(--line)', borderRadius:'var(--radius)',
            display:'flex', alignItems:'center', padding:'0 12px', fontFamily:'var(--font-mono)', fontSize:13, color:'var(--fg1)',
            letterSpacing:shown?0:'.05em', overflow:'hidden', whiteSpace:'nowrap' }}>
            {shown ? secret : masked}
          </div>
          <Button variant="secondary" icon={shown?'eye-off':'eye'} onClick={()=>setShown(s=>!s)}>{shown?'Скрыть':'Показать'}</Button>
          <Button variant="primary" icon={copied?'check':'copy'} onClick={()=>{ copy(secret, ()=>{ setCopied(true); setTimeout(()=>setCopied(false),1600); }); }}>
            {copied?'Скопировано':'Копировать'}</Button>
        </div>
      </div>
      <button onClick={onDismiss} title="Я сохранил ключ" style={{ width:28, height:28, flexShrink:0, background:'transparent',
        border:'1px solid transparent', borderRadius:'var(--radius)', color:'var(--fg3)', cursor:'pointer', display:'inline-flex',
        alignItems:'center', justifyContent:'center' }}><Icon name="x" size={18}/></button>
    </div>
  </div>;
}

/* ── Confirm dialog (revoke / rotate) ────────────────────────── */
function Confirm({ title, body, confirmLabel, danger, onConfirm, onClose }) {
  return <div onMouseDown={onClose} style={{ position:'fixed', inset:0, zIndex:300, background:'rgba(1,4,9,.72)',
    display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}>
    <div onMouseDown={e=>e.stopPropagation()} style={{ width:400, background:'var(--panel)', border:'1px solid var(--line)',
      borderRadius:'var(--radius)', padding:24 }}>
      <div style={{ display:'flex', gap:12, marginBottom:16 }}>
        <span style={{ width:32, height:32, flexShrink:0, borderRadius:'var(--radius)', display:'inline-flex', alignItems:'center',
          justifyContent:'center', background: danger?'rgba(248,81,73,.1)':'var(--accent-soft)',
          border:`1px solid ${danger?'rgba(248,81,73,.4)':'var(--accent-line)'}`, color: danger?'var(--status-err)':'var(--accent-safe)' }}>
          <Icon name={danger?'alert-triangle':'refresh-cw'} size={17}/></span>
        <div>
          <div className="h3" style={{ fontSize:15, marginBottom:4 }}>{title}</div>
          <div style={{ fontSize:12.5, color:'var(--fg2)', lineHeight:1.5 }}>{body}</div>
        </div>
      </div>
      <div style={{ display:'flex', justifyContent:'flex-end', gap:10 }}>
        <Button variant="ghost" onClick={onClose}>Отмена</Button>
        <Button variant={danger?'destructive':'primary'} onClick={onConfirm}>{confirmLabel}</Button>
      </div>
    </div>
  </div>;
}

/* ── Row actions menu ────────────────────────────────────────── */
function RowMenu({ k, onRotate, onRevoke }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(()=>{ const h=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h); },[]);
  const dead = k.status!=='active';
  return <div ref={ref} style={{ position:'relative' }}>
    <IconBtn icon="more-horizontal" title="Действия" onClick={()=>setOpen(o=>!o)} />
    {open && <div style={{ position:'absolute', top:'calc(100% + 4px)', right:0, zIndex:50, width:190, background:'var(--panel-soft)',
      border:'1px solid var(--line)', borderRadius:'var(--radius)', padding:4, display:'flex', flexDirection:'column' }}>
      <MenuItem icon="copy" label="Копировать ID ключа" onClick={()=>{ copy(k.prefix); setOpen(false); }} />
      {!dead && <MenuItem icon="refresh-cw" label="Ротация ключа" onClick={()=>{ setOpen(false); onRotate(k); }} />}
      <div style={{ height:1, background:'var(--line)', margin:'4px 0' }} />
      {!dead
        ? <MenuItem icon="slash" label="Отозвать" danger onClick={()=>{ setOpen(false); onRevoke(k); }} />
        : <MenuItem icon="trash-2" label="Удалить из списка" danger onClick={()=>{ setOpen(false); onRevoke(k); }} />}
    </div>}
  </div>;
}
function MenuItem({ icon, label, danger, onClick }) {
  const [h,setH]=React.useState(false);
  return <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 9px', borderRadius:'var(--radius-sm)', border:'none',
      background: h?(danger?'rgba(248,81,73,.08)':'var(--panel-muted)'):'transparent', cursor:'pointer', textAlign:'left',
      color: danger?'var(--status-err)':'var(--fg1)', fontFamily:'var(--font-ui)', fontSize:13 }}>
    <Icon name={icon} size={14} style={{ color: danger?'var(--status-err)':'var(--fg2)' }} />{label}</button>;
}

/* ── Key table ───────────────────────────────────────────────── */
const TH = { textAlign:'left', padding:'0 16px', height:36, fontFamily:'var(--font-mono)', fontSize:10, letterSpacing:'.1em',
  textTransform:'uppercase', color:'var(--fg3)', fontWeight:500, whiteSpace:'nowrap', borderBottom:'1px solid var(--line)',
  position:'sticky', top:0, background:'var(--panel-muted)', zIndex:5 };
const TD = { padding:'0 16px', height:56, borderBottom:'1px solid var(--line)', verticalAlign:'middle', whiteSpace:'nowrap' };

function KeyRow({ k, onRotate, onRevoke }) {
  const dead = k.status!=='active';
  return <tr className="keyrow">
    <td style={{ ...TD, opacity:dead?.55:1 }}>
      <div style={{ display:'flex', alignItems:'center', gap:11 }}>
        <span style={{ width:8, height:8, borderRadius:'50%', flexShrink:0,
          background: k.status==='active'?'var(--status-ok)':(k.status==='revoked'?'var(--status-err)':'var(--status-off)'),
          animation: k.status==='active'?'pulse 2.4s var(--ease) infinite':'none' }} />
        <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:13, color:'var(--fg1)' }}>{k.name}</span>
          <span style={{ fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)' }}>{k.prefix}…</span>
        </div>
      </div>
    </td>
    <td style={{ ...TD, opacity:dead?.55:1 }}>
      {k.status==='active'
        ? (k.expiringSoon ? <Badge status="warn">Скоро истечёт</Badge> : <Badge status="active" />)
        : <Badge status={k.status} />}
    </td>
    <td style={{ ...TD, opacity:dead?.55:1 }}><PermCell perms={k.perms} /></td>
    <td style={{ ...TD, fontFamily:'var(--font-mono)', fontSize:12, color:'var(--fg2)', opacity:dead?.55:1 }}>{k.created}</td>
    <td style={{ ...TD, fontFamily:'var(--font-mono)', fontSize:12, opacity:dead?.55:1,
      color: k.expiringSoon?'var(--status-warn)':(k.expires?'var(--fg2)':'var(--fg3)') }}>
      {k.expires || 'бессрочный'}</td>
    <td style={{ ...TD, fontFamily:'var(--font-mono)', fontSize:12, color: k.status==='active'?'var(--fg1)':'var(--fg3)', opacity:dead?.55:1 }}>{k.last}</td>
    <td style={{ ...TD, textAlign:'right' }}>
      <RowMenu k={k} onRotate={onRotate} onRevoke={onRevoke} />
    </td>
  </tr>;
}

/* ── Empty state with Бит ────────────────────────────────────── */
function EmptyState({ onCreate }) {
  return <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'72px 24px',
    border:'1px dashed var(--line)', borderRadius:'var(--radius)', background:'var(--panel)' }}>
    <img src="../assets/bit-mascot.svg" width="72" height="72" alt="Бит" style={{ marginBottom:20, opacity:.9 }} />
    <div className="h3" style={{ fontSize:16, marginBottom:8 }}>Пока ни одного ключа</div>
    <div style={{ fontSize:13, color:'var(--fg2)', maxWidth:340, textAlign:'center', lineHeight:1.55, marginBottom:22 }}>
      API-ключи дают сервисам и скриптам программный доступ к платформе с ограниченным набором прав. Создайте первый — секрет покажется один раз.
    </div>
    <Button variant="primary" icon="plus" onClick={onCreate}>Создать ключ</Button>
  </div>;
}

/* ── Page ────────────────────────────────────────────────────── */
function genSecret(){ const c='abcdef0123456789'; let s='isk_live_'; for(let i=0;i<32;i++) s+=c[Math.floor(Math.random()*16)]; return s; }

function App() {
  const [keys, setKeys] = React.useState(USER_KEYS);
  const [modal, setModal] = React.useState(false);
  const [secret, setSecret] = React.useState(null);
  const [confirm, setConfirm] = React.useState(null);

  const active = keys.filter(k=>k.status==='active').length;
  const expiringSoon = keys.filter(k=>k.expiringSoon && k.status==='active').length;

  const handleCreate = ({ name, perms, expires }) => {
    const full = genSecret();
    const nk = { id:'new-'+Date.now(), name, prefix:full.slice(0,12), status:'active', perms,
      created:window.fmtToday(), expires, last:'не использовался', _new:true };
    setKeys(k=>[nk, ...k]);
    setSecret({ name, secret:full });
    setModal(false);
  };
  const doRevoke = k => setConfirm({
    danger:true, title: k.status==='active'?'Отозвать ключ?':'Удалить ключ?',
    body: k.status==='active'
      ? <>Ключ <b style={{color:'var(--fg1)',fontFamily:'var(--font-mono)'}}>{k.name}</b> немедленно перестанет работать. Все запросы с ним получат <span className="code">401</span>. Действие необратимо.</>
      : <>Удалить <b style={{color:'var(--fg1)',fontFamily:'var(--font-mono)'}}>{k.name}</b> из списка? Запись пропадёт из этого представления.</>,
    confirmLabel: k.status==='active'?'Отозвать':'Удалить',
    onConfirm: ()=>{ setKeys(ks=> k.status==='active' ? ks.map(x=>x.id===k.id?{...x,status:'revoked',expires:'отозван '+window.fmtToday(),expiringSoon:false,last:'—'}:x) : ks.filter(x=>x.id!==k.id)); setConfirm(null); }
  });
  const doRotate = k => setConfirm({
    danger:false, title:'Ротация ключа', confirmLabel:'Сгенерировать новый секрет',
    body: <>Текущий секрет ключа <b style={{color:'var(--fg1)',fontFamily:'var(--font-mono)'}}>{k.name}</b> будет отозван и заменён новым. Права и название сохранятся. Обновите секрет в интеграциях.</>,
    onConfirm: ()=>{ const full=genSecret(); setKeys(ks=>ks.map(x=>x.id===k.id?{...x,prefix:full.slice(0,12),last:'не использовался'}:x));
      setSecret({ name:k.name, secret:full }); setConfirm(null); }
  });

  return <div style={{ maxWidth:1100, margin:'0 auto', padding:'32px 32px 64px' }}>
    {/* breadcrumb + header */}
    <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:18, fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)' }}>
      <span>Настройки</span><Icon name="chevron-right" size={13}/><span style={{ color:'var(--fg2)' }}>Доступ</span>
      <Icon name="chevron-right" size={13}/><span style={{ color:'var(--accent-safe)' }}>API-ключи</span>
    </div>
    <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'space-between', gap:24, marginBottom:8 }}>
      <div>
        <h1 className="h1" style={{ marginBottom:8 }}>API-ключи</h1>
        <p style={{ fontSize:13.5, color:'var(--fg2)', maxWidth:560, lineHeight:1.5 }}>
          Программный доступ к платформе от вашего имени. Каждый ключ ограничен набором прав и, опционально, сроком действия.
        </p>
      </div>
      <Button variant="primary" icon="plus" onClick={()=>setModal(true)}>Создать ключ</Button>
    </div>

    {/* meta strip */}
    <div style={{ display:'flex', gap:24, padding:'14px 0 22px', borderBottom:'1px solid var(--line)', marginBottom:24 }}>
      <Stat label="Активных" value={active} />
      <Sep/>
      <Stat label="Скоро истекут" value={expiringSoon} tone={expiringSoon?'warn':null} />
      <Sep/>
      <Stat label="Всего" value={keys.length} />
      <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8, fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg3)' }}>
        <Icon name="shield" size={13} style={{ color:'var(--accent-safe)' }}/> секреты хранятся как Argon2-хеш
      </div>
    </div>

    {secret && <SecretReveal data={secret} onDismiss={()=>setSecret(null)} />}

    {keys.length===0
      ? <EmptyState onCreate={()=>setModal(true)} />
      : <div style={{ border:'1px solid var(--line)', borderRadius:'var(--radius)', overflow:'hidden', background:'var(--panel)' }}>
          <div style={{ overflowX:'auto' }}>
            <table style={{ width:'100%', borderCollapse:'collapse', minWidth:880 }}>
              <thead><tr>
                <th style={{ ...TH, paddingLeft:16 }}>Ключ</th>
                <th style={TH}>Статус</th>
                <th style={TH}>Права</th>
                <th style={TH}>Создан</th>
                <th style={TH}>Истекает</th>
                <th style={TH}>Последнее использование</th>
                <th style={{ ...TH, textAlign:'right' }}></th>
              </tr></thead>
              <tbody>
                {keys.map(k => <KeyRow key={k.id} k={k} onRotate={doRotate} onRevoke={doRevoke} />)}
              </tbody>
            </table>
          </div>
        </div>}

    {/* footer note */}
    <div style={{ marginTop:18, display:'flex', alignItems:'center', gap:8, fontSize:12, color:'var(--fg3)' }}>
      <Icon name="info" size={13}/> Отозванные и истёкшие ключи показываются 30 дней для аудита, затем удаляются автоматически.
    </div>

    {modal && <CreateKeyModal onClose={()=>setModal(false)} onCreate={handleCreate} />}
    {confirm && <Confirm {...confirm} onClose={()=>setConfirm(null)} />}
  </div>;
}
function Stat({ label, value, tone }) {
  return <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
    <span style={{ fontFamily:'var(--font-mono)', fontSize:22, fontWeight:600, lineHeight:1,
      color: tone==='warn'?'var(--status-warn)':'var(--fg1)' }}>{String(value).padStart(2,'0')}</span>
    <span className="label" style={{ fontSize:9 }}>{label}</span>
  </div>;
}
const Sep = () => <div style={{ width:1, background:'var(--line)', alignSelf:'stretch' }} />;

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}
boot();
</script>
</body></html>
