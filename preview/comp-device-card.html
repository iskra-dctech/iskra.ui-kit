<!DOCTYPE html>
<!-- @dsCard group="Components" name="Device tile" subtitle="Configurable sparkline metric (per device / user)" viewport="700x290" --><html lang="ru"><head><meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D1117;font-family:'Inter',sans-serif;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
.card{background:#161B22;border:1px solid #30363D;border-radius:4px;padding:12px;cursor:pointer;position:relative}
.card.hover{border-color:#00FFC2}
.top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.nm{font-size:13px;font-weight:600;color:#F0F6FC}
.st{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase}
.st.ok{color:#00AA85}.st.dr{color:#F97316}
.ip{font-family:'JetBrains Mono',monospace;font-size:11px;color:#8B949E;margin-bottom:10px}
.metahd{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3px;gap:8px}
/* configurable metric switcher */
.mswitch{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#8B949E;border:1px solid #30363D;border-radius:3px;padding:2px 6px;cursor:pointer;white-space:nowrap}
.mswitch:hover{border-color:#00FFC2;color:#00FFC2}
.mswitch .cv{color:#6E7681;font-size:8px}
.mval{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#F0F6FC;white-space:nowrap}
.mval.al{color:#F97316}
.spark{height:26px;display:flex;align-items:flex-end;gap:2px;margin-bottom:8px}
.b{flex:1;border-radius:1px;background:#00AA85;opacity:.3}
.b.hi{opacity:.7}.b.mid{opacity:.5}.b.al{background:#F97316;opacity:.85}
.b.info{background:#58A6FF}
.tags{display:flex;gap:4px}
.t{font-family:'JetBrains Mono';font-size:9px;color:#8B949E;background:#0D1117;border:1px solid #30363D;border-radius:2px;padding:1px 5px}
/* metric config popover */
.pop{position:absolute;top:78px;right:12px;z-index:5;width:150px;border:1px solid #30363D;border-radius:4px;background:#1D2530;overflow:hidden}
.pophd{font-family:'JetBrains Mono';font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#6E7681;padding:7px 10px 5px;border-bottom:1px solid #30363D}
.mopt{display:flex;align-items:center;gap:7px;padding:6px 10px;font-family:'JetBrains Mono';font-size:11px;color:#F0F6FC;border-bottom:1px solid #21262D}
.mopt:last-child{border-bottom:none}
.mopt.sel{background:rgba(0,170,133,.10);color:#00FFC2}
.mopt .chk{margin-left:auto;font-size:10px}
.mopt .sw{width:6px;height:6px;border-radius:50%}
.scope{font-family:'JetBrains Mono';font-size:8px;color:#6E7681;padding:6px 10px;border-top:1px solid #30363D;line-height:1.5}
</style></head><body>

<!-- Tile A: configured to show TRAFFIC -->
<div class="card hover">
  <div class="top"><span class="d" style="background:#00FFC2"></span><span class="nm">spine-01.msk</span><span class="st ok">Sync</span></div>
  <div class="ip">10.0.1.1</div>
  <div class="metahd"><span class="mswitch">Трафик · 24 ч <span class="cv">▾</span></span><span class="mval">1.4 Гбит/с</span></div>
  <div class="spark"><span class="b info" style="height:40%;opacity:.4"></span><span class="b info" style="height:55%;opacity:.5"></span><span class="b info" style="height:35%;opacity:.35"></span><span class="b info" style="height:70%;opacity:.7"></span><span class="b info" style="height:60%;opacity:.55"></span><span class="b info" style="height:45%;opacity:.4"></span><span class="b info" style="height:75%;opacity:.7"></span><span class="b info" style="height:58%;opacity:.5"></span></div>
  <div class="tags"><span class="t">spine</span><span class="t">prod</span></div>
</div>

<!-- Tile B: switcher open, choosing metric -->
<div class="card">
  <div class="top"><span class="d" style="background:#F97316"></span><span class="nm">leaf-07.msk</span><span class="st dr">Drift</span></div>
  <div class="ip">10.0.2.7</div>
  <div class="metahd"><span class="mswitch" style="border-color:#00FFC2;color:#00FFC2">CPU · 24 ч <span class="cv" style="color:#00FFC2">▴</span></span><span class="mval al">88%</span></div>
  <div class="spark"><span class="b mid" style="height:50%"></span><span class="b al" style="height:85%"></span><span class="b al" style="height:90%"></span><span class="b al" style="height:88%"></span><span class="b mid" style="height:60%"></span><span class="b" style="height:40%"></span><span class="b mid" style="height:55%"></span><span class="b" style="height:42%"></span></div>
  <div class="tags"><span class="t">leaf</span><span class="t">drift</span></div>
  <div class="pop">
    <div class="pophd">Метрика спарклайна</div>
    <div class="mopt sel"><span class="sw" style="background:#00AA85"></span>CPU<span class="chk">✓</span></div>
    <div class="mopt"><span class="sw" style="background:#F97316"></span>Температура</div>
    <div class="mopt"><span class="sw" style="background:#58A6FF"></span>Трафик</div>
    <div class="mopt"><span class="sw" style="background:#8B949E"></span>Память</div>
    <div class="mopt"><span class="sw" style="background:#F85149"></span>Латентность</div>
    <div class="scope">Применить: <span style="color:#00AA85">это устройство</span> · все · профиль</div>
  </div>
</div>

</body></html>
