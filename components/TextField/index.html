<!-- @dsCard group="Components" name="TextField" subtitle="label · hint · error · иконка · clear · s·m·l · тёмная + холодная" viewport="820x640" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--panel:#161B22;--panel-muted:#202A35;--line:#30363D;
  --fg1:#F0F6FC;--fg2:#8B949E;--fg3:#6E7681;
  --accent:#00FFC2;--accent-safe:#00AA85;--status-err:#F85149;--radius:4px;
  --font-ui:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
}
.theme-cold{--bg:#EEF2F7;--panel:#E2E8F0;--panel-muted:#DCE3EC;--line:#CDD5E0;
  --fg1:#1C2128;--fg2:#57606A;--fg3:#8B949E;--accent:#00AA85;--accent-safe:#008268;--status-err:#D0302A;}
body{background:var(--bg);font-family:var(--font-ui);color:var(--fg1);padding:24px;}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin:0 0 12px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 28px;align-items:start;max-width:760px;}
.col{display:flex;flex-direction:column;gap:18px;}
.coldwrap{margin-top:26px;background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:20px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ICONS={
  'search':'<circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14.5" y2="14.5"/>',
  'user':'<circle cx="8" cy="5.5" r="2.8"/><path d="M2.5 14c0-3 2.4-4.8 5.5-4.8s5.5 1.8 5.5 4.8"/>',
  'lock':'<rect x="3.5" y="7" width="9" height="6.5" rx="1.2"/><path d="M5.5 7V5.2a2.5 2.5 0 0 1 5 0V7"/>',
};
function Icon({name,size='1em'}){const i=ICONS[name];if(!i)return null;const px=typeof size==='number'?size+'px':size;
  return <svg width={px} height={px} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" style={{display:'inline-block',flexShrink:0,verticalAlign:'middle'}} dangerouslySetInnerHTML={{__html:i}}/>;}

const _TF_CSS=`
.ik-tf-wrap{display:flex;flex-direction:column;gap:6px;width:100%;font-family:var(--font-ui,'Inter',sans-serif);}
.ik-tf-label{font-size:12px;font-weight:500;color:var(--fg2,#8B949E);}
.ik-tf-label .ik-tf-req{color:var(--status-err,#F85149);margin-left:2px;}
.ik-tf-field{display:flex;align-items:center;gap:8px;box-sizing:border-box;background:var(--bg,#0D1117);border:1px solid var(--line,#30363D);border-radius:var(--radius,4px);padding:0 10px;color:var(--fg1,#F0F6FC);transition:border-color .12s,box-shadow .12s;}
.ik-tf-s{height:28px;font-size:12px;}
.ik-tf-m{height:32px;font-size:13px;}
.ik-tf-l{height:36px;font-size:14px;}
.ik-tf-field:focus-within{border-color:var(--accent,#00FFC2);box-shadow:0 0 0 1px var(--accent,#00FFC2);}
.ik-tf-input{flex:1;min-width:0;border:none;background:transparent;outline:none;color:var(--fg1,#F0F6FC);font:inherit;padding:0;height:100%;}
.ik-tf-input::placeholder{color:var(--fg3,#6E7681);}
.ik-tf-ico{display:flex;align-items:center;color:var(--fg3,#6E7681);flex-shrink:0;}
.ik-tf-clear{display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;background:transparent;color:var(--fg3,#6E7681);cursor:pointer;padding:2px;border-radius:2px;transition:color .12s;}
.ik-tf-clear:hover{color:var(--fg1,#F0F6FC);}
.ik-tf-field.is-error{border-color:var(--status-err,#F85149);}
.ik-tf-field.is-error:focus-within{border-color:var(--status-err,#F85149);box-shadow:0 0 0 1px var(--status-err,#F85149);}
.ik-tf-field.is-disabled{opacity:.5;cursor:not-allowed;}
.ik-tf-msg{font-size:11px;line-height:1.4;color:var(--fg3,#6E7681);}
.ik-tf-msg.is-error{color:var(--status-err,#F85149);}
`;
(function(){const e=document.createElement('style');e.textContent=_TF_CSS;document.head.appendChild(e);})();
function ClearGlyph(){return <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" aria-hidden="true"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>;}
let _id=0;
function TextField({size='m',label,hint,error,required=false,iconBefore,clearable=false,onClear,disabled=false,value,defaultValue,onChange,id,className='',wrapClassName='',clearLabel='Очистить',...rest}){
  const inputRef=React.useRef(null);
  const reactId=React.useMemo(()=>id||`ik-tf-${++_id}`,[id]);
  const [hasVal,setHasVal]=React.useState(value!=null?String(value).length>0:String(defaultValue??'').length>0);
  const controlled=value!=null;
  const showClear=clearable&&!disabled&&(controlled?String(value).length>0:hasVal);
  const handleChange=(e)=>{if(!controlled)setHasVal(e.target.value.length>0);onChange?.(e);};
  const handleClear=()=>{const el=inputRef.current;if(el){const s=Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype,'value').set;s.call(el,'');el.dispatchEvent(new Event('input',{bubbles:true}));el.focus();}if(!controlled)setHasVal(false);onClear?.();};
  const errText=typeof error==='string'?error:null;const isError=!!error;
  const fieldCls=['ik-tf-field','ik-tf-'+size,isError&&'is-error',disabled&&'is-disabled',className].filter(Boolean).join(' ');
  return (
    <div className={('ik-tf-wrap '+wrapClassName).trim()}>
      {label&&<label className="ik-tf-label" htmlFor={reactId}>{label}{required&&<span className="ik-tf-req">*</span>}</label>}
      <div className={fieldCls}>
        {iconBefore&&<span className="ik-tf-ico">{iconBefore}</span>}
        <input ref={inputRef} id={reactId} className="ik-tf-input" disabled={disabled} value={value} defaultValue={defaultValue} onChange={handleChange} aria-invalid={isError||undefined} {...rest}/>
        {showClear&&<button type="button" className="ik-tf-clear" onClick={handleClear} aria-label={clearLabel}><ClearGlyph/></button>}
      </div>
      {(errText||hint)&&<div className={'ik-tf-msg'+(isError?' is-error':'')}>{errText||hint}</div>}
    </div>
  );
}

function App(){
  const [v,setV]=React.useState('leaf-07.msk');
  return (
    <div>
      <p className="lbl">Поля · размер m</p>
      <div className="grid">
        <div className="col">
          <TextField label="Поиск устройства" placeholder="hostname или IP…" iconBefore={<Icon name="search"/>}/>
          <TextField label="Имя ключа" defaultValue="prod-key" clearable hint="Уникально в рамках проекта"/>
          <TextField label="Хост" value={v} onChange={e=>setV(e.target.value)} clearable iconBefore={<Icon name="search"/>}/>
        </div>
        <div className="col">
          <TextField label="Логин" placeholder="оператор" iconBefore={<Icon name="user"/>} required/>
          <TextField label="Имя ключа" defaultValue="prod-key" error="Уже используется"/>
          <TextField label="Токен" defaultValue="••••••••••••" iconBefore={<Icon name="lock"/>} disabled/>
        </div>
      </div>

      <p className="lbl" style={{marginTop:28}}>Размеры · s · m · l</p>
      <div className="grid">
        <div className="col">
          <TextField size="s" placeholder="Small · 28px" iconBefore={<Icon name="search"/>} clearable defaultValue="фильтр"/>
          <TextField size="m" placeholder="Medium · 32px" iconBefore={<Icon name="search"/>}/>
          <TextField size="l" placeholder="Large · 36px" iconBefore={<Icon name="search"/>}/>
        </div>
        <div className="col theme-cold">
          <p className="lbl" style={{color:'#57606A',margin:0}}>Холодная тема</p>
          <div className="coldwrap" style={{marginTop:0,display:'flex',flexDirection:'column',gap:16}}>
            <TextField label="Поиск" placeholder="hostname…" iconBefore={<Icon name="search"/>} clearable defaultValue="spine-01"/>
            <TextField label="Имя ключа" defaultValue="staging-key" error="Уже используется"/>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
