<!-- @dsCard group="Components" name="Icon" subtitle="Единый набор · 80+ глифов · 16×16 · stroke 1.5 · currentColor · масштаб от текста" viewport="900x620" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D1117;--panel:#161B22;--line:#30363D;
  --fg1:#F0F6FC;--fg2:#8B949E;--fg3:#6E7681;--accent:#00FFC2;--accent-safe:#00AA85;
  --font-ui:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;
}
.theme-cold{--bg:#EEF2F7;--panel:#E2E8F0;--line:#CDD5E0;--fg1:#1C2128;--fg2:#57606A;--fg3:#8B949E;--accent:#00AA85;--accent-safe:#008268;}
body{background:var(--bg);font-family:var(--font-ui);color:var(--fg1);padding:24px;}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin:0 0 14px;}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:4px;overflow:hidden;}
.cell{background:var(--panel);display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 6px 10px;color:var(--fg1);}
.cell .nm{font-family:var(--font-mono);font-size:8px;color:var(--fg3);letter-spacing:.01em;text-align:center;word-break:break-word;line-height:1.3;}
.cell:hover{color:var(--accent);}
.cell:hover .nm{color:var(--accent-safe);}
.demos{display:flex;gap:28px;align-items:flex-start;margin-top:26px;flex-wrap:wrap;}
.demo{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
.demo .row{display:flex;align-items:center;gap:10px;color:var(--fg1);}
.sz{font-family:var(--font-mono);font-size:10px;color:var(--fg2);}
.coldwrap{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:14px 16px;display:flex;gap:16px;align-items:center;color:var(--fg1);flex-wrap:wrap;max-width:230px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon, ICON_NAMES } = window.DCIDesignSystem_2e8fb0;

function App(){
  const names = ICON_NAMES;
  return (
    <div>
      <p className="lbl">Полный набор · {names.length} иконок · клик-цвет от currentColor</p>
      <div className="grid">
        {names.map(n => (
          <div className="cell" key={n}>
            <Icon name={n} size={20}/>
            <span className="nm">{n}</span>
          </div>
        ))}
      </div>

      <div className="demos">
        <div className="demo">
          <span className="sz">Масштаб от размера текста (size="1em")</span>
          <div className="row" style={{fontSize:12}}><Icon name="search"/> 12px</div>
          <div className="row" style={{fontSize:16}}><Icon name="search"/> 16px</div>
          <div className="row" style={{fontSize:22}}><Icon name="search"/> 22px</div>
        </div>
        <div className="demo">
          <span className="sz">Цвет наследуется (currentColor)</span>
          <div className="row" style={{color:'#00FFC2'}}><Icon name="success" size={18}/> accent</div>
          <div className="row" style={{color:'#F97316'}}><Icon name="warning" size={18}/> warn</div>
          <div className="row" style={{color:'#F85149'}}><Icon name="error" size={18}/> error</div>
        </div>
        <div className="demo">
          <span className="sz">Холодная тема</span>
          <div className="coldwrap theme-cold">
            <Icon name="bell" size={18}/><Icon name="settings" size={18}/>
            <Icon name="server" size={18}/><Icon name="database" size={18}/>
            <Icon name="git-branch" size={18}/><Icon name="terminal" size={18}/>
            <Icon name="shield-check" size={18}/><Icon name="key" size={18}/>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
