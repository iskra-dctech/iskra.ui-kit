<!-- @dsCard group="Components" name="Radio & RadioGroup" subtitle="одиночный выбор · вертикально / горизонтально · описание · disabled · s·m" viewport="760x440" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D1117;--panel:#161B22;--line:#30363D;--fg1:#F0F6FC;--fg2:#8B949E;--fg3:#6E7681;--accent:#00FFC2;--accent-safe:#00AA85;--font-ui:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;}
.theme-cold{--bg:#EEF2F7;--panel:#E2E8F0;--line:#CDD5E0;--fg1:#1C2128;--fg2:#57606A;--fg3:#8B949E;--accent:#00AA85;--accent-safe:#008268;}
body{background:var(--bg);font-family:var(--font-ui);color:var(--fg1);padding:24px;}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin:0 0 14px;}
.cols{display:flex;gap:56px;flex-wrap:wrap;align-items:flex-start;}
.coldwrap{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:20px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const _RD_CSS=`
.ik-rdg{display:flex;font-family:var(--font-ui,'Inter',sans-serif);}
.ik-rdg-vertical{flex-direction:column;gap:14px;}
.ik-rdg-horizontal{flex-direction:row;gap:24px;flex-wrap:wrap;}
.ik-rd{display:inline-flex;align-items:flex-start;gap:9px;cursor:pointer;color:var(--fg1,#F0F6FC);user-select:none;position:relative;}
.ik-rd.is-disabled{cursor:not-allowed;opacity:.5;}
.ik-rd-input{position:absolute;opacity:0;width:1px;height:1px;margin:0;}
.ik-rd-circle{flex-shrink:0;display:flex;align-items:center;justify-content:center;box-sizing:border-box;border:1px solid var(--line,#30363D);border-radius:50%;background:var(--bg,#0D1117);transition:border-color .12s,box-shadow .12s;margin-top:1px;}
.ik-rd-s .ik-rd-circle{width:14px;height:14px;}
.ik-rd-m .ik-rd-circle{width:16px;height:16px;}
.ik-rd:not(.is-disabled):hover .ik-rd-circle{border-color:var(--accent,#00FFC2);}
.ik-rd-dot{border-radius:50%;background:var(--accent,#00FFC2);transform:scale(0);transition:transform .12s cubic-bezier(.2,.6,.2,1);}
.ik-rd-s .ik-rd-dot{width:6px;height:6px;}
.ik-rd-m .ik-rd-dot{width:8px;height:8px;}
.ik-rd-input:checked + .ik-rd-circle{border-color:var(--accent,#00FFC2);}
.ik-rd-input:checked + .ik-rd-circle .ik-rd-dot{transform:scale(1);}
.ik-rd-input:focus-visible + .ik-rd-circle{box-shadow:0 0 0 1px var(--bg,#0D1117),0 0 0 2px var(--accent,#00FFC2);}
.ik-rd-textwrap{display:flex;flex-direction:column;}
.ik-rd-text{font-size:13px;line-height:1.45;}
.ik-rd-s .ik-rd-text{font-size:12px;}
.ik-rd-desc{font-size:11px;line-height:1.4;color:var(--fg2,#8B949E);margin-top:2px;}
`;
(function(){const e=document.createElement('style');e.textContent=_RD_CSS;document.head.appendChild(e);})();
let _id=0;
function Radio({value,checked,defaultChecked,name,disabled=false,size='m',label,description,onChange,id,className='',...rest}){
  const reactId=React.useMemo(()=>id||`ik-rd-${++_id}`,[id]);
  const cls=['ik-rd','ik-rd-'+size,disabled&&'is-disabled',className].filter(Boolean).join(' ');
  return (
    <label className={cls} htmlFor={reactId}>
      <input id={reactId} type="radio" className="ik-rd-input" value={value} name={name} checked={checked} defaultChecked={defaultChecked} disabled={disabled} onChange={onChange} {...rest}/>
      <span className="ik-rd-circle" aria-hidden="true"><span className="ik-rd-dot"/></span>
      {(label||description)&&<span className="ik-rd-textwrap">{label&&<span className="ik-rd-text">{label}</span>}{description&&<span className="ik-rd-desc">{description}</span>}</span>}
    </label>
  );
}
function RadioGroup({name,value,defaultValue,onChange,options,size='m',orientation='vertical',disabled=false,className='',children,...rest}){
  const groupName=React.useMemo(()=>name||`ik-rdg-${++_id}`,[name]);
  const controlled=value!=null;
  const [internal,setInternal]=React.useState(defaultValue);
  const current=controlled?value:internal;
  const handle=(v)=>{if(!controlled)setInternal(v);onChange?.(v);};
  const cls=['ik-rdg','ik-rdg-'+orientation,className].filter(Boolean).join(' ');
  return (
    <div className={cls} role="radiogroup" {...rest}>
      {options?options.map((opt,i)=><Radio key={opt.value??i} name={groupName} size={size} value={opt.value} label={opt.label} description={opt.description} disabled={disabled||opt.disabled} checked={current===opt.value} onChange={()=>handle(opt.value)}/>):null}
    </div>
  );
}

function App(){
  const [scope,setScope]=React.useState('all');
  return (
    <div>
      <div className="cols">
        <div>
          <p className="lbl">Вертикально · с описанием</p>
          <RadioGroup value={scope} onChange={setScope} options={[
            {value:'all',label:'Все сайты',description:'84 устройства в 2 ДЦ'},
            {value:'msk',label:'Только MSK-DC1',description:'42 устройства'},
            {value:'spb',label:'Только SPB-DC2',description:'42 устройства'},
            {value:'arch',label:'Архив',description:'Недоступно',disabled:true},
          ]}/>
        </div>
        <div>
          <p className="lbl">Горизонтально · m</p>
          <RadioGroup defaultValue="spine" orientation="horizontal" options={[
            {value:'spine',label:'Spine'},{value:'leaf',label:'Leaf'},{value:'border',label:'Border'},
          ]}/>
          <p className="lbl" style={{marginTop:28}}>Компактный · s</p>
          <RadioGroup defaultValue="day" size="s" orientation="horizontal" options={[
            {value:'day',label:'День'},{value:'week',label:'Неделя'},{value:'month',label:'Месяц'},
          ]}/>
          <p className="lbl" style={{marginTop:28}}>Холодная тема</p>
          <div className="theme-cold" style={{display:'inline-block'}}>
            <div className="coldwrap">
              <RadioGroup defaultValue="b" options={[
                {value:'a',label:'Эталон A'},{value:'b',label:'Эталон B'},
              ]}/>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
