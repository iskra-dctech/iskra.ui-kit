<!-- @dsCard group="Components" name="Badge & Tag" subtitle="статус-сигналы (dot / icon) · mono-теги · removable chips · s·m" viewport="760x420" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D1117;--panel:#161B22;--line:#30363D;--fg1:#F0F6FC;--fg2:#8B949E;--fg3:#6E7681;
  --accent:#00FFC2;--accent-safe:#00AA85;--accent-soft:rgba(0,170,133,.14);--accent-line:rgba(0,170,133,.32);
  --status-ok:#00FFC2;--status-warn:#F97316;--status-err:#F85149;--status-info:#58A6FF;
  --font-ui:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;}
.theme-cold{--bg:#EEF2F7;--panel:#E2E8F0;--line:#CDD5E0;--fg1:#1C2128;--fg2:#57606A;--fg3:#8B949E;
  --accent:#00AA85;--accent-safe:#008268;--accent-soft:#E6F7F2;--accent-line:rgba(0,170,133,.32);
  --status-ok:#00AA85;--status-warn:#D0610A;--status-err:#D0302A;--status-info:#2E6DA4;}
body{background:var(--bg);font-family:var(--font-ui);color:var(--fg1);padding:24px;}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin:0 0 14px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:22px;}
.coldwrap{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:18px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ICONS={'success':'<circle cx="8" cy="8" r="6"/><polyline points="5.3,8.2 7,10 10.7,5.8"/>','error':'<circle cx="8" cy="8" r="6"/><line x1="5.5" y1="5.5" x2="10.5" y2="10.5"/><line x1="10.5" y1="5.5" x2="5.5" y2="10.5"/>'};
function Icon({name,size='1em'}){const i=ICONS[name];if(!i)return null;const px=typeof size==='number'?size+'px':size;return <svg width={px} height={px} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" style={{display:'inline-block',flexShrink:0,verticalAlign:'middle'}} dangerouslySetInnerHTML={{__html:i}}/>;}

const _BDG_CSS=`
.ik-bdg{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-ui,'Inter',sans-serif);font-weight:500;line-height:1;white-space:nowrap;border:1px solid;border-radius:3px;border-color:color-mix(in srgb, currentColor 38%, transparent);background:color-mix(in srgb, currentColor 12%, transparent);}
.ik-bdg-m{font-size:12px;padding:5px 10px;}
.ik-bdg-s{font-size:11px;padding:3px 7px;gap:5px;}
.ik-bdg-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:currentColor;}
.ik-bdg-s .ik-bdg-dot{width:5px;height:5px;}
.ik-bdg-success{color:var(--status-ok,#00FFC2);}
.ik-bdg-warning{color:var(--status-warn,#F97316);}
.ik-bdg-error{color:var(--status-err,#F85149);}
.ik-bdg-info{color:var(--status-info,#58A6FF);}
.ik-bdg-accent{color:var(--accent-safe,#00AA85);}
.ik-bdg-neutral{color:var(--fg2,#8B949E);border-color:var(--line,#30363D);background:var(--panel,#161B22);}
.ik-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono,'JetBrains Mono',monospace);font-size:10px;letter-spacing:.04em;line-height:1.4;color:var(--fg2,#8B949E);background:var(--bg,#0D1117);border:1px solid var(--line,#30363D);border-radius:2px;padding:2px 6px;}
.ik-tag-accent{color:var(--accent-safe,#00AA85);background:var(--accent-soft,rgba(0,170,133,.14));border-color:var(--accent-line,rgba(0,170,133,.32));}
.ik-tag-x{display:inline-flex;align-items:center;justify-content:center;border:none;background:transparent;color:currentColor;opacity:.65;cursor:pointer;padding:0;margin:-1px -2px -1px 0;border-radius:2px;}
.ik-tag-x:hover{opacity:1;}
`;
(function(){const e=document.createElement('style');e.textContent=_BDG_CSS;document.head.appendChild(e);})();
function Badge({variant='neutral',size='m',dot=false,icon,children,className='',...rest}){
  const cls=['ik-bdg','ik-bdg-'+size,'ik-bdg-'+variant,className].filter(Boolean).join(' ');
  return <span className={cls} {...rest}>{dot&&<span className="ik-bdg-dot" aria-hidden="true"/>}{icon}{children}</span>;
}
function Tag({accent=false,onRemove,removeLabel='Удалить',children,className='',...rest}){
  const cls=['ik-tag',accent&&'ik-tag-accent',className].filter(Boolean).join(' ');
  return <span className={cls} {...rest}>{children}{onRemove&&<button type="button" className="ik-tag-x" onClick={onRemove} aria-label={removeLabel}><svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" aria-hidden="true"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg></button>}</span>;
}

function App(){
  const [tags,setTags]=React.useState(['prod','leaf','drift','msk-dc1']);
  return (
    <div>
      <p className="lbl">Статус-бейджи · dot · m</p>
      <div className="row">
        <Badge variant="success" dot>Sync</Badge>
        <Badge variant="warning" dot>Drift</Badge>
        <Badge variant="error" dot>Error</Badge>
        <Badge variant="info" dot>Maintenance</Badge>
        <Badge variant="neutral" dot>Offline</Badge>
      </div>

      <p className="lbl">С иконкой · и компактные s</p>
      <div className="row">
        <Badge variant="success" icon={<Icon name="success" size={13}/>}>Online</Badge>
        <Badge variant="error" icon={<Icon name="error" size={13}/>}>Critical</Badge>
        <Badge variant="accent">v2.4.1</Badge>
        <span style={{width:12}}/>
        <Badge size="s" variant="success" dot>Sync</Badge>
        <Badge size="s" variant="warning" dot>Drift</Badge>
        <Badge size="s" variant="neutral">42</Badge>
      </div>

      <p className="lbl">Mono-теги и removable chips</p>
      <div className="row">
        <Tag>spine</Tag><Tag>prod</Tag><Tag>leaf</Tag><Tag>msk-dc1</Tag>
        <span style={{width:12}}/>
        {tags.map(t=><Tag key={t} accent onRemove={()=>setTags(s=>s.filter(x=>x!==t))}>{t}</Tag>)}
      </div>

      <p className="lbl" style={{color:'#8B949E'}}>Холодная тема</p>
      <div className="theme-cold" style={{display:'inline-block'}}>
        <div className="coldwrap">
          <Badge variant="success" dot>Sync</Badge>
          <Badge variant="warning" dot>Drift</Badge>
          <Badge variant="error" dot>Error</Badge>
          <Badge variant="info" dot>Maintenance</Badge>
          <Badge variant="neutral" dot>Offline</Badge>
          <Tag>spine</Tag><Tag accent>prod</Tag>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
