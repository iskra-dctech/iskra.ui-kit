<!-- @dsCard group="Components" name="Switch" subtitle="on/off · скользящий ползунок · label + description · disabled · s·m" viewport="720x380" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<style>
@font-face{font-family:'Inter';src:url('../../fonts/Inter-VariableFont_opsz_wght.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'JetBrains Mono';src:url('../../fonts/JetBrainsMono_wght_.ttf') format('truetype');font-weight:100 800;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D1117;--panel:#161B22;--line:#30363D;--fg1:#F0F6FC;--fg2:#8B949E;--fg3:#6E7681;--accent:#00FFC2;--accent-safe:#00AA85;--font-ui:'Inter',system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;}
.theme-cold{--bg:#EEF2F7;--panel:#E2E8F0;--line:#CDD5E0;--fg1:#1C2128;--fg2:#57606A;--fg3:#8B949E;--accent:#00AA85;--accent-safe:#008268;}
body{background:var(--bg);font-family:var(--font-ui);color:var(--fg1);padding:24px;}
.lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);margin:0 0 14px;}
.cols{display:flex;gap:56px;flex-wrap:wrap;align-items:flex-start;}
.col{display:flex;flex-direction:column;gap:16px;}
.coldwrap{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:20px;display:flex;flex-direction:column;gap:16px;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const _SW_CSS=`
.ik-sw{display:inline-flex;align-items:flex-start;gap:10px;cursor:pointer;font-family:var(--font-ui,'Inter',sans-serif);color:var(--fg1,#F0F6FC);user-select:none;position:relative;}
.ik-sw.is-disabled{cursor:not-allowed;opacity:.5;}
.ik-sw-input{position:absolute;opacity:0;width:1px;height:1px;margin:0;}
.ik-sw-track{position:relative;flex-shrink:0;background:var(--line,#30363D);transition:background .15s;margin-top:1px;}
.ik-sw-knob{position:absolute;border-radius:50%;background:#F0F6FC;box-shadow:0 0 0 1px rgba(0,0,0,.06);transition:transform .15s cubic-bezier(.2,.6,.2,1);}
.ik-sw-m .ik-sw-track{width:34px;height:19px;border-radius:10px;}
.ik-sw-m .ik-sw-knob{width:15px;height:15px;top:2px;left:2px;}
.ik-sw-m .ik-sw-input:checked + .ik-sw-track .ik-sw-knob{transform:translateX(15px);}
.ik-sw-s .ik-sw-track{width:30px;height:17px;border-radius:9px;}
.ik-sw-s .ik-sw-knob{width:13px;height:13px;top:2px;left:2px;}
.ik-sw-s .ik-sw-input:checked + .ik-sw-track .ik-sw-knob{transform:translateX(13px);}
.ik-sw-input:checked + .ik-sw-track{background:var(--accent-safe,#00AA85);}
.ik-sw-input:focus-visible + .ik-sw-track{box-shadow:0 0 0 1px var(--bg,#0D1117),0 0 0 2px var(--accent,#00FFC2);}
.ik-sw-textwrap{display:flex;flex-direction:column;}
.ik-sw-text{font-size:13px;line-height:1.45;}
.ik-sw-s .ik-sw-text{font-size:12px;}
.ik-sw-desc{font-size:11px;line-height:1.4;color:var(--fg2,#8B949E);margin-top:2px;}
`;
(function(){const e=document.createElement('style');e.textContent=_SW_CSS;document.head.appendChild(e);})();
let _id=0;
function Switch({checked,defaultChecked,disabled=false,size='m',label,description,onChange,id,className='',...rest}){
  const reactId=React.useMemo(()=>id||`ik-sw-${++_id}`,[id]);
  const cls=['ik-sw','ik-sw-'+size,disabled&&'is-disabled',className].filter(Boolean).join(' ');
  return (
    <label className={cls} htmlFor={reactId}>
      <input id={reactId} type="checkbox" role="switch" className="ik-sw-input" checked={checked} defaultChecked={defaultChecked} disabled={disabled} onChange={onChange} {...rest}/>
      <span className="ik-sw-track" aria-hidden="true"><span className="ik-sw-knob"/></span>
      {(label||description)&&<span className="ik-sw-textwrap">{label&&<span className="ik-sw-text">{label}</span>}{description&&<span className="ik-sw-desc">{description}</span>}</span>}
    </label>
  );
}

function App(){
  const [bit,setBit]=React.useState(true);
  return (
    <div>
      <div className="cols">
        <div className="col">
          <p className="lbl">Состояния</p>
          <Switch label="Выключен" />
          <Switch label="Включён" defaultChecked />
          <Switch label="Заблокирован" disabled />
          <Switch label="Заблокирован · вкл" defaultChecked disabled />
        </div>
        <div className="col">
          <p className="lbl">С описанием · m</p>
          <Switch label="Показывать Бит" description="Маскот в углу консоли" checked={bit} onChange={e=>setBit(e.target.checked)}/>
          <Switch label="Тех-обслуживание" description="Скрывает алёрты на 1 час" />
          <p className="lbl" style={{marginTop:14}}>Компактный · s</p>
          <Switch size="s" label="Auto-refresh" defaultChecked />
          <Switch size="s" label="Звук уведомлений" />
        </div>
        <div className="col theme-cold">
          <p className="lbl" style={{color:'#57606A'}}>Холодная тема</p>
          <div className="coldwrap">
            <Switch label="Включён" defaultChecked />
            <Switch label="Выключен" />
            <Switch size="s" label="Компактный" defaultChecked />
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
