name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  verify:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Token adherence
        run: pnpm lint:tokens

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit + a11y tests
        run: pnpm test

      - name: Build packages + Storybook
        run: pnpm build
        env:
          STORYBOOK_BASE_PATH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && format('/{0}/', github.event.repository.name) || '' }}

      - name: Upload Storybook static
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/docs-react/storybook-static
          if-no-files-found: error
          retention-days: 7

  deploy-storybook:
    name: deploy Storybook → GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - id: deployment
        uses: actions/deploy-pages@v4
